<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supreme Archive</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Supreme Archive">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#fff;
  font-family:-apple-system;
}

.header{
  padding:20px;
  text-align:center;
  font-size:24px;
  font-family:'Montserrat', sans-serif;
  font-weight:800;
  font-style:italic;
}

.counter-row{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  margin-bottom:10px;
}

.counter{
  color:#e10600;
  font-weight:600;
}

.add-link{
  position:absolute;
  left:18px;
  color:#e10600;
  font-weight:700;
  text-decoration:none;
}

.fit-link{
  position:absolute;
  right:18px;
  color:#e10600;
  font-weight:700;
  text-decoration:none;
}

.category-bar{
  display:flex;
  gap:15px;
  overflow:auto;
  padding:10px 20px;
  border-bottom:1px solid #eee;
}

.category{
  color:#e10600;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  padding:18px;
}

.card{
  text-align:center;
}

.thumb{
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:contain;

  -webkit-user-drag: none;
}

.name{
  margin-top:12px;
  font-family:'Special Elite', monospace;
}

/* 🔥 TRASH */
#trashBin{
  position:fixed;
  left:50%;
  bottom:-120px;
  transform:translateX(-50%) scale(1);
  width:84px;
  height:84px;
  background:#e10600;
  color:#fff;
  font-size:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:22px;
  transition:all 0.2s ease;
  z-index:3000;
  opacity:0;
}

img {
  -webkit-user-drag: none;
  -webkit-touch-callout: none;
  user-select: none;
}
  
#trashBin.show{
  bottom:28px;
  opacity:1;
}

#trashBin.active{
  transform:translateX(-50%) scale(1.2);
}
</style>
</head>

<body>

<div id="trashBin">🗑</div>

<div class="header">Supreme Archive</div>

<div class="counter-row">
  <a class="add-link" href="add.html">+ Add</a>
  <div class="counter" id="counter"></div>
  <a class="fit-link" href="fit.html">Build a Fit</a>
</div>

<div class="category-bar">
  <div class="category" onclick="filterCategory('All')">All</div>
  <div class="category" onclick="filterCategory('Tops')">Tops</div>
  <div class="category" onclick="filterCategory('Bottoms')">Bottoms</div>
  <div class="category" onclick="filterCategory('Hats')">Hats</div>
  <div class="category" onclick="filterCategory('Bags')">Bags</div>
  <div class="category" onclick="filterCategory('Accessories')">Accessories</div>
  <div class="category" onclick="filterCategory('Skate')">Skate</div>
</div>

<div class="grid" id="grid"></div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1AP4KwfrGxdReQIcCQHcTtoMfMyYs_6Rd5xbCwAHh15w/export?format=csv&gid=0";

let items = [];
let allItems = [];

function firstPhoto(imageField){
  if(!imageField) return "";
  return imageField.split("|")[0].trim();
}

function clean(v){
  return (v ?? "").toString().trim().replace(/^"+|"+$/g,"");
}

fetch(sheetURL)
.then(res=>res.text())
.then(csv=>{

  const rows = Papa.parse(csv,{skipEmptyLines:true}).data;

  items = rows.slice(1).map(c=>({
    id: clean(c[0]),
    name: clean(c[1]),
    category: clean(c[2]),
    image: clean(c[8])
  }))
  .filter(i=>i.id && i.name && i.image);

  let myItems = JSON.parse(localStorage.getItem("myItems") || "[]");

  allItems = [...myItems, ...items];

  document.getElementById("counter").innerText =
    `Total Pieces: ${allItems.length}`;

  displayItems(allItems);
});


function displayItems(list){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  list.forEach(item=>{

    const imgSrc = item.image || item.src;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="thumb">
        <img src="${firstPhoto(imgSrc)}">
      </div>
      <div class="name">${item.name}</div>
    `;

    div.onclick = () => {
      const params = new URLSearchParams();

if(item.id.startsWith("user-")){
  params.set("id", item.sheetId || item.id);
} else {
  params.set("id", item.id);
}

window.location = "item.html?" + params.toString();
    };

    enableDragDelete(div, item);

    grid.appendChild(div);
  });
}


function filterCategory(cat){
  if(cat==="All") return displayItems(allItems);
  displayItems(allItems.filter(i=>i.category===cat));
}


/* 🔥 DRAG SYSTEM */
let holdTimer=null;
let dragGhost=null;
let didLongPress=false;

function enableDragDelete(card,item){

  let startX=0,startY=0,isDragging=false;

  card.addEventListener("touchstart",e=>{

    if(!isUserItem(item)) return;

    const t=e.touches[0];
    startX=t.clientX;
    startY=t.clientY;

    holdTimer=setTimeout(()=>{
      isDragging=true;
      didLongPress=true;

      showTrash();

      dragGhost=card.cloneNode(true);
      dragGhost.style.position="fixed";
      dragGhost.style.left=(t.clientX-100)+"px";
      dragGhost.style.top=(t.clientY-100)+"px";
      dragGhost.style.width=card.offsetWidth+"px";
      dragGhost.style.pointerEvents="none";
      dragGhost.style.zIndex="2000";
      dragGhost.style.opacity="0.95";

      document.body.appendChild(dragGhost);

      card.style.opacity="0.3";

    },300);

  },{passive:true});


  card.addEventListener("touchmove",e=>{

    const t=e.touches[0];

    if(!isDragging){
      if(Math.abs(t.clientX-startX)>10 || Math.abs(t.clientY-startY)>10){
        clearTimeout(holdTimer);
      }
      return;
    }

    e.preventDefault();

    dragGhost.style.left=(t.clientX-100)+"px";
    dragGhost.style.top=(t.clientY-100)+"px";

    const trash=document.getElementById("trashBin").getBoundingClientRect();

    const over =
      t.clientX>trash.left &&
      t.clientX<trash.right &&
      t.clientY>trash.top &&
      t.clientY<trash.bottom;

    document.getElementById("trashBin").classList.toggle("active",over);

  },{passive:false});


  card.addEventListener("touchend",e=>{

    clearTimeout(holdTimer);

    if(!isDragging) return;

    const t=e.changedTouches[0];
    const trash=document.getElementById("trashBin").getBoundingClientRect();

    const dropped =
      t.clientX>trash.left &&
      t.clientX<trash.right &&
      t.clientY>trash.top &&
      t.clientY<trash.bottom;

    cleanup(card);

    if(dropped) deleteItem(item.id);

  });


  card.addEventListener("click",e=>{
    if(didLongPress){
      e.preventDefault();
      e.stopPropagation();
      didLongPress=false;
    }
  },true);
}


function cleanup(card){
  card.style.opacity="";
  if(dragGhost) dragGhost.remove();
  dragGhost=null;
  document.getElementById("trashBin").classList.remove("show","active");
}

function showTrash(){
  document.getElementById("trashBin").classList.add("show");
}

function deleteItem(id){

  let myItems = JSON.parse(localStorage.getItem("myItems") || "[]");

  myItems = myItems.filter(i => i.id !== id);

  localStorage.setItem("myItems", JSON.stringify(myItems));

  allItems = allItems.filter(i => i.id !== id);

  document.getElementById("counter").innerText =
    `Total Pieces: ${allItems.length}`;

  displayItems(allItems);
}

function isUserItem(item){
  const myItems = JSON.parse(localStorage.getItem("myItems") || "[]");
  return myItems.some(i=>i.id===item.id);
}
</script>

</body>
</html>
