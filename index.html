<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supreme Archive</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Supreme Archive">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#fff;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}

.header-wrap{
  position:relative;
  padding:20px 0 10px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.header{
  text-align:center;
  font-size:24px;
  font-family:'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-weight:800;
  font-style:italic;
}

.menu-btn{
  position:absolute;
  top:18px;
  left:26px;
  background:none;
  border:none;
  color:#e10600;
  font-size:28px;
  font-weight:800;
  cursor:pointer;
  z-index:5100;
}

.menu-btn.right{
  left:auto;
  right:26px;
}

.counter-row{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  margin-bottom:10px;
}

.counter{
  color:#e10600;
  font-weight:600;
}

.add-link{
  position:absolute;
  left:18px;
  color:#e10600;
  font-weight:700;
  text-decoration:none;
}

.fit-link{
  position:absolute;
  right:18px;
  color:#e10600;
  font-weight:700;
  text-decoration:none;
}

.category-bar{
  display:flex;
  gap:15px;
  overflow:auto;
  padding:10px 20px;
  border-bottom:1px solid #eee;
}

.category{
  color:#e10600;
  cursor:pointer;
  white-space:nowrap;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  padding:18px;
}

.card{
  text-align:center;
}

.thumb{
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:contain;
  -webkit-user-drag:none;
}

.name{
  margin-top:12px;
  font-family:'Special Elite', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}

img{
  -webkit-user-drag:none;
  -webkit-touch-callout:none;
  user-select:none;
}

/* trash */

#trashBin{
  position:fixed;
  left:50%;
  bottom:-120px;
  transform:translateX(-50%) scale(1);
  width:84px;
  height:84px;
  background:#e10600;
  color:#fff;
  font-size:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:22px;
  transition:all .2s ease;
  z-index:3000;
  opacity:0;
}

#trashBin.show{
  bottom:28px;
  opacity:1;
}

#trashBin.active{
  transform:translateX(-50%) scale(1.2);
}

/* dropdown */

.dropdown{
  position:absolute;
  top:62px;
  left:20px;
  right:20px;
  background:#fff;
  border-radius:18px;
  box-shadow:0 12px 35px rgba(0,0,0,.18);
  overflow:hidden;
  z-index:6000;
  display:none;
}

.dropdown.show{
  display:block;
}

.dropdown button{
  width:100%;
  padding:16px 18px;
  background:#fff;
  border:none;
  border-bottom:1px solid #eee;
  text-align:left;
  font-size:17px;
}

/* settings */

.settingsOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:7000;
}

.settingsOverlay.show{
  display:flex;
}

.settingsModal{
  width:86%;
  background:white;
  border-radius:18px;
  overflow:hidden;
}

.settingsModal h2{
  margin:0;
  padding:20px 20px 4px;
  font-size:22px;
}

.settingsModal p{
  margin:0;
  padding:0 20px 16px;
}

.settingsBody{
  padding:18px 20px;
}

.settingsBody label{
  display:block;
  margin-bottom:8px;
}

.settingsBody select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
  margin-bottom:18px;
}

.settingsActions{
  display:flex;
  justify-content:space-between;
  padding:0 20px 20px;
}

.cancelBtn{
  background:white;
  border:1px solid #111;
  border-radius:22px;
  padding:12px 22px;
  font-weight:700;
}

.saveSettingsBtn{
  background:#111;
  color:white;
  border:none;
  border-radius:22px;
  padding:12px 22px;
  font-weight:700;
}
</style>
</head>

<body>

<div id="trashBin">🗑</div>

<div class="header-wrap">

  <button id="menuBtn" class="menu-btn">☰</button>

  <div class="header">Supreme Archive</div>

  <div class="dropdown" id="dropdownMenu">
    <button id="requestText" onclick="window.location.href='request.html'">Request Items</button>
    <button id="settingsText" onclick="openSettings()">Language & Currency</button>
    <button id="socialsText" onclick="alert('Socials coming soon')">Socials</button>
  </div>

</div>

<div class="counter-row">
  <a class="add-link" id="addText" href="add.html">+ Add</a>
  <div class="counter" id="counter"></div>
  <a class="fit-link" id="fitText" href="fit.html">Build a Fit</a>
</div>

<div class="category-bar">
  <div class="category" onclick="filterCategory('All')">All</div>
  <div class="category" onclick="filterCategory('Tops')">Tops</div>
  <div class="category" onclick="filterCategory('Bottoms')">Bottoms</div>
  <div class="category" onclick="filterCategory('Hats')">Hats</div>
  <div class="category" onclick="filterCategory('Bags')">Bags</div>
  <div class="category" onclick="filterCategory('Accessories')">Accessories</div>
  <div class="category" onclick="filterCategory('Skate')">Skate</div>
</div>

<div class="grid" id="grid"></div>

<div class="settingsOverlay" id="settingsOverlay">
  <div class="settingsModal">

    <h2 id="settingsTitle">Change your settings</h2>
    <p id="settingsSub">Choose your language & preferred currency below</p>

    <div class="settingsBody">

      <label id="languageLabel">Language</label>
      <select id="languageSelect">
        <option value="English">English</option>
        <option value="French">Français</option>
        <option value="Spanish">Español</option>
        <option value="Japanese">日本語</option>
        <option value="Korean">한국어</option>
        <option value="Chinese">中文</option>
        <option value="German">Deutsch</option>
        <option value="Italian">Italiano</option>
        <option value="Portuguese">Português</option>
      </select>

      <label id="currencyLabel">Currency</label>
      <select id="currencySelect">
        <option value="CAD">$ CAD</option>
        <option value="USD">$ USD</option>
      </select>

    </div>

    <div class="settingsActions">
      <button class="cancelBtn" id="cancelText" onclick="closeSettings()">Cancel</button>
      <button class="saveSettingsBtn" id="saveText" onclick="saveSettings()">Save Changes</button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1AP4KwfrGxdReQIcCQHcTtoMfMyYs_6Rd5xbCwAHh15w/export?format=csv&gid=0";

let items = [];
let allItems = [];

/* translations */

const translations = {

  },

    add: "+ 添加",

    settingsSub: "Wähle deine Sprache und bevorzugte Währung",
    language: "Sprache",
    currency: "Währung",

    save: "Speichern",

  },

    add: "+ Aggiungi",
    buildFit: "Crea fit",
    requestItems: "Richiedi articoli",
    languageCurrency: "Lingua e valuta",
    socials: "Social",
    settingsTitle: "Modifica impostazioni",
    settingsSub: "Scegli lingua e valuta preferita",
    language: "Lingua",
    currency: "Valuta",
    cancel: "Annulla",
    save: "Salva",
    totalPieces: "Totale pezzi"
  },
  Portuguese: {
    add: "+ Adicionar",
    buildFit: "Criar look",
    requestItems: "Solicitar itens",
    languageCurrency: "Idioma e moeda",
    socials: "Redes sociais",
    settingsTitle: "Alterar configurações",
    settingsSub: "Escolha seu idioma e moeda preferida",

  }
};

function getLang(){
  return localStorage.getItem("language") || "English";
}

function t(key){
  return translations[getLang()]?.[key] || translations.English[key];
}

function applyLanguage(){
  document.getElementById("addText").textContent = t("add");
  document.getElementById("fitText").textContent = t("buildFit");
  document.getElementById("requestText").textContent = t("requestItems");
  document.getElementById("settingsText").textContent = t("languageCurrency");
  document.getElementById("socialsText").textContent = t("socials");
  document.getElementById("settingsTitle").textContent = t("settingsTitle");
  document.getElementById("settingsSub").textContent = t("settingsSub");
  document.getElementById("languageLabel").textContent = t("language");
  document.getElementById("currencyLabel").textContent = t("currency");
  document.getElementById("cancelText").textContent = t("cancel");
  document.getElementById("saveText").textContent = t("save");

  if(allItems.length){
    document.getElementById("counter").innerText =
      `${t("totalPieces")}: ${allItems.length}`;
  }
}

/* helpers */

function firstPhoto(imageField){
  if(!imageField) return "";
  return imageField.split("|")[0].trim();
}

function clean(v){
  return (v ?? "").toString().trim().replace(/^"+|"+$/g,"");
}

function sortArchiveItems(list){

  const categoryOrder = {
    "Tops":0,
    "Bottoms":1,
    "Hats":2,
    "Bags":3,
    "Accessories":4,
    "Skate":5
  };

  const getNumericId = (item)=>{
    if(!item?.id) return 0;

    if(String(item.id).startsWith("user-")){
      return Number(String(item.id).replace("user-","")) || 0;
    }

    const match = String(item.id).match(/\d+/g);
    if(!match) return 0;

    return Number(match.join("")) || 0;
  };

  return [...list].sort((a,b)=>{

    const catA = categoryOrder[a.category] ?? 999;
    const catB = categoryOrder[b.category] ?? 999;

    if(catA !== catB){
      return catA - catB;
    }

    return getNumericId(b) - getNumericId(a);

  });

}

/* data */

fetch(sheetURL)
.then(res=>res.text())
.then(csv=>{

  const rows = Papa.parse(csv,{skipEmptyLines:true}).data;

  items = rows.slice(1).map(c=>({
    id: clean(c[0]),
    name: clean(c[1]),
    category: clean(c[2]),
    image: clean(c[8])
  }))
  .filter(i=>i.id && i.name && i.image);

  let myItems = JSON.parse(localStorage.getItem("myItems") || "[]");

  allItems = sortArchiveItems([...myItems, ...items]);

  localStorage.setItem("archiveItems", JSON.stringify(items));

  document.getElementById("counter").innerText =
    `${t("totalPieces")}: ${allItems.length}`;

  applyLanguage();

  displayItems(allItems);

});

/* display */

function displayItems(list){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  list.forEach(item=>{

    const imgSrc = item.image || item.src;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="thumb">
        <img src="${firstPhoto(imgSrc)}">
      </div>
      <div class="name">${item.name}</div>
    `;

    div.onclick = ()=>{

      const params = new URLSearchParams();

      if(item.sheetId){
        params.set("id", item.sheetId);
      } else {
        params.set("id", item.id);
      }

      window.location = "item.html?" + params.toString();

    };

    enableDragDelete(div,item);

    grid.appendChild(div);

  });

}

function filterCategory(cat){
  if(cat==="All") return displayItems(allItems);
  displayItems(allItems.filter(i=>i.category===cat));
}

/* delete */

let holdTimer = null;
let dragGhost = null;
let didLongPress = false;

function enableDragDelete(card,item){

  let startX=0,startY=0,isDragging=false;

  card.addEventListener("touchstart",e=>{

    if(!isUserItem(item)) return;

    const t=e.touches[0];
    startX=t.clientX;
    startY=t.clientY;

    holdTimer=setTimeout(()=>{
      isDragging=true;
      didLongPress=true;

      showTrash();

      dragGhost=card.cloneNode(true);
      dragGhost.style.position="fixed";
      dragGhost.style.left=(t.clientX-100)+"px";
      dragGhost.style.top=(t.clientY-100)+"px";
      dragGhost.style.width=card.offsetWidth+"px";
      dragGhost.style.pointerEvents="none";
      dragGhost.style.zIndex="2000";
      dragGhost.style.opacity="0.95";

      document.body.appendChild(dragGhost);

      card.style.opacity="0.3";

    },300);

  },{passive:true});


  card.addEventListener("touchmove",e=>{

    const t=e.touches[0];

    if(!isDragging){
      if(Math.abs(t.clientX-startX)>10 || Math.abs(t.clientY-startY)>10){
        clearTimeout(holdTimer);
      }
      return;
    }

    e.preventDefault();

    dragGhost.style.left=(t.clientX-100)+"px";
    dragGhost.style.top=(t.clientY-100)+"px";

    const trash=document.getElementById("trashBin").getBoundingClientRect();

    const over =
      t.clientX>trash.left &&
      t.clientX<trash.right &&
      t.clientY>trash.top &&
      t.clientY<trash.bottom;

    document.getElementById("trashBin").classList.toggle("active",over);

  },{passive:false});


  card.addEventListener("touchend",e=>{

    clearTimeout(holdTimer);

    if(!isDragging){
      cleanup(card);
      return;
    }

    const t=e.changedTouches[0];
    const trash=document.getElementById("trashBin").getBoundingClientRect();

    const dropped =
      t.clientX>trash.left &&
      t.clientX<trash.right &&
      t.clientY>trash.top &&
      t.clientY<trash.bottom;

    cleanup(card);

    if(dropped) deleteItem(item.id);

  });


  card.addEventListener("click",e=>{
    if(didLongPress){
      e.preventDefault();
      e.stopPropagation();
      didLongPress=false;
    }
  },true);
}

function cleanup(card){
  card.style.opacity="";
  if(dragGhost) dragGhost.remove();
  dragGhost=null;
  document.getElementById("trashBin").classList.remove("show","active");
}

function showTrash(){
  document.getElementById("trashBin").classList.add("show");
}

function deleteItem(id){

  let myItems = JSON.parse(localStorage.getItem("myItems") || "[]");

  myItems = myItems.filter(i => i.id !== id);

  localStorage.setItem("myItems", JSON.stringify(myItems));

  allItems = allItems.filter(i => i.id !== id);
  allItems = sortArchiveItems(allItems);

  document.getElementById("counter").innerText =
    `${t("totalPieces")}: ${allItems.length}`;

  displayItems(allItems);
}

function isUserItem(item){
  const myItems = JSON.parse(localStorage.getItem("myItems") || "[]");
  return myItems.some(i=>i.id===item.id);
}

/* menu */

const menuBtn = document.getElementById("menuBtn");
const dropdownMenu = document.getElementById("dropdownMenu");

if(localStorage.getItem("menuSide") === "right"){
  menuBtn.classList.add("right");
}

menuBtn.onclick = ()=>{

  if(menuDidDrag){
    menuDidDrag = false;
    return;
  }

  dropdownMenu.classList.toggle("show");

  menuBtn.textContent =
    dropdownMenu.classList.contains("show")
    ? "×"
    : "☰";

};

let menuHoldTimer = null;
let menuDragging = false;
let menuGhost = null;
let menuDidDrag = false;
let menuOffsetX = 0;
let menuOffsetY = 0;

menuBtn.addEventListener("touchstart", e=>{

  const t = e.touches[0];

  menuHoldTimer = setTimeout(()=>{

    menuDragging = true;
    menuDidDrag = true;

    dropdownMenu.classList.remove("show");
    menuBtn.textContent = "☰";

    const rect = menuBtn.getBoundingClientRect();

    menuOffsetX = t.clientX - rect.left;
    menuOffsetY = t.clientY - rect.top;

    menuGhost = menuBtn.cloneNode(true);

    menuGhost.style.position = "fixed";
    menuGhost.style.left = (t.clientX - menuOffsetX) + "px";
    menuGhost.style.top = (t.clientY - menuOffsetY) + "px";
    menuGhost.style.zIndex = "9000";
    menuGhost.style.pointerEvents = "none";
    menuGhost.style.opacity = "0.9";

    document.body.appendChild(menuGhost);

    menuBtn.style.opacity = "0.3";

  },350);

},{passive:true});

menuBtn.addEventListener("touchmove", e=>{

  if(!menuDragging) return;

  e.preventDefault();

  const t = e.touches[0];

  menuGhost.style.left = (t.clientX - menuOffsetX) + "px";
  menuGhost.style.top = (t.clientY - menuOffsetY) + "px";

},{passive:false});

menuBtn.addEventListener("touchend", e=>{

  clearTimeout(menuHoldTimer);

  if(!menuDragging) return;

  const t = e.changedTouches[0];

  const half = window.innerWidth / 2;

  if(t.clientX > half){
    menuBtn.classList.add("right");
    localStorage.setItem("menuSide","right");
  } else {
    menuBtn.classList.remove("right");
    localStorage.setItem("menuSide","left");
  }

  menuDragging = false;

  if(menuGhost) menuGhost.remove();

  menuGhost = null;

  menuBtn.style.opacity = "1";

});

/* settings */

function openSettings(){

  document.getElementById("currencySelect").value =
    localStorage.getItem("currency") || "CAD";

  document.getElementById("languageSelect").value =
    localStorage.getItem("language") || "English";

  document.getElementById("settingsOverlay")
    .classList.add("show");

}

function closeSettings(){
  document.getElementById("settingsOverlay")
    .classList.remove("show");
}

function saveSettings(){

  localStorage.setItem(
    "currency",
    document.getElementById("currencySelect").value
  );

  localStorage.setItem(
    "language",
    document.getElementById("languageSelect").value
  );

  applyLanguage();

  closeSettings();

}

applyLanguage();
</script>

</body>
</html>
