<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supreme Archive</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Supreme Archive">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:#fff;
  font-family:-apple-system;
}

.header-wrap{
  padding:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  position:relative;
}

.header-wrap.right{
  flex-direction:row-reverse;
}

.header{
  font-size:24px;
  font-family:'Montserrat', sans-serif;
  font-weight:800;
  font-style:italic;
}

.menu-btn{
  background:none;
  border:none;
  color:#e10600;
  font-size:26px;
  font-weight:800;
  cursor:pointer;
}

/* DROPDOWN */

.dropdown{
  position:absolute;
  top:72px;
  left:20px;
  right:20px;
  background:white;
  border-radius:18px;
  box-shadow:0 12px 35px rgba(0,0,0,.18);
  overflow:hidden;
  z-index:5000;
  display:none;
}

.dropdown.show{
  display:block;
}

.dropdown button{
  width:100%;
  padding:16px 18px;
  background:white;
  border:0;
  border-bottom:1px solid #eee;
  text-align:left;
  font-size:17px;
}

/* SETTINGS MODAL */

.settingsOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:6000;
}

.settingsOverlay.show{
  display:flex;
}

.settingsModal{
  width:86%;
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 16px 45px rgba(0,0,0,.25);
}

.settingsModal h2{
  margin:0;
  padding:20px 20px 4px;
  font-size:22px;
}

.settingsModal p{
  margin:0;
  padding:0 20px 16px;
  color:#333;
}

.settingsBody{
  padding:18px 20px;
}

.settingsBody label{
  display:block;
  margin-bottom:8px;
  font-size:16px;
}

.settingsBody select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
  margin-bottom:18px;
}

.settingsActions{
  display:flex;
  justify-content:space-between;
  padding:0 20px 20px;
}

.cancelBtn{
  background:white;
  border:1px solid #111;
  border-radius:22px;
  padding:12px 22px;
  font-weight:700;
}

.saveSettingsBtn{
  background:#111;
  color:white;
  border:none;
  border-radius:22px;
  padding:12px 22px;
  font-weight:700;
}

.counter-row{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  margin-bottom:10px;
}

.counter{
  color:#e10600;
  font-weight:600;
}

.add-link{
  position:absolute;
  left:18px;
  color:#e10600;
  font-weight:700;
  text-decoration:none;
}

.fit-link{
  position:absolute;
  right:18px;
  color:#e10600;
  font-weight:700;
  text-decoration:none;
}

.category-bar{
  display:flex;
  gap:15px;
  overflow:auto;
  padding:10px 20px;
  border-bottom:1px solid #eee;
}

.category{
  color:#e10600;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  padding:18px;
}

.card{
  text-align:center;
}

.thumb{
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:contain;
  -webkit-user-drag:none;
}

.name{
  margin-top:12px;
  font-family:'Special Elite', monospace;
}

#trashBin{
  position:fixed;
  left:50%;
  bottom:-120px;
  transform:translateX(-50%) scale(1);
  width:84px;
  height:84px;
  background:#e10600;
  color:#fff;
  font-size:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:22px;
  transition:all 0.2s ease;
  z-index:3000;
  opacity:0;
}

#trashBin.show{
  bottom:28px;
  opacity:1;
}

#trashBin.active{
  transform:translateX(-50%) scale(1.2);
}

img{
  -webkit-user-drag:none;
  -webkit-touch-callout:none;
  user-select:none;
}

</style>
</head>

<body>

<div id="trashBin">🗑</div>

<div class="header-wrap" id="headerWrap">
  <button id="menuBtn" class="menu-btn">☰</button>
  <div class="header">Supreme Archive</div>
</div>

<!-- DROPDOWN -->

<div class="dropdown" id="dropdownMenu">

  <button onclick="window.location.href='request.html'">
    Request Items
  </button>

  <button onclick="openSettings()">
    Currency & Language
  </button>

  <button onclick="alert('Socials coming soon')">
    Socials
  </button>

</div>

<!-- SETTINGS -->

<div class="settingsOverlay" id="settingsOverlay">

  <div class="settingsModal">

    <h2>Change your settings</h2>

    <p>
      Choose your language & preferred currency below
    </p>

    <div class="settingsBody">

      <label>Language</label>

      <select id="languageSelect">
        <option value="English">English</option>
      </select>

      <label>Currency</label>

      <select id="currencySelect">
        <option value="CAD">$ CAD</option>
        <option value="USD">$ USD</option>
      </select>

    </div>

    <div class="settingsActions">

      <button
        class="cancelBtn"
        onclick="closeSettings()"
      >
        Cancel
      </button>

      <button
        class="saveSettingsBtn"
        onclick="saveSettings()"
      >
        Save Changes
      </button>

    </div>

  </div>

</div>

<div class="counter-row">
  <a class="add-link" href="add.html">+ Add</a>
  <div class="counter" id="counter"></div>
  <a class="fit-link" href="fit.html">Build a Fit</a>
</div>

<div class="category-bar">
  <div class="category" onclick="filterCategory('All')">All</div>
  <div class="category" onclick="filterCategory('Tops')">Tops</div>
  <div class="category" onclick="filterCategory('Bottoms')">Bottoms</div>
  <div class="category" onclick="filterCategory('Hats')">Hats</div>
  <div class="category" onclick="filterCategory('Bags')">Bags</div>
  <div class="category" onclick="filterCategory('Accessories')">Accessories</div>
  <div class="category" onclick="filterCategory('Skate')">Skate</div>
</div>

<div class="grid" id="grid"></div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

const menuBtn = document.getElementById("menuBtn");
const dropdownMenu = document.getElementById("dropdownMenu");
const headerWrap = document.getElementById("headerWrap");

if(localStorage.getItem("menuSide") === "right"){
  headerWrap.classList.add("right");
}

menuBtn.onclick = () => {
  dropdownMenu.classList.toggle("show");

  menuBtn.textContent =
    dropdownMenu.classList.contains("show")
    ? "×"
    : "☰";
};

let menuHoldTimer = null;

menuBtn.addEventListener("touchstart", () => {

  menuHoldTimer = setTimeout(() => {

    headerWrap.classList.toggle("right");

    localStorage.setItem(
      "menuSide",
      headerWrap.classList.contains("right")
      ? "right"
      : "left"
    );

  }, 500);

}, {passive:true});

menuBtn.addEventListener("touchend", () => {
  clearTimeout(menuHoldTimer);
});

function openSettings(){

  document.getElementById("currencySelect").value =
    localStorage.getItem("currency") || "CAD";

  document.getElementById("languageSelect").value =
    localStorage.getItem("language") || "English";

  document
    .getElementById("settingsOverlay")
    .classList.add("show");
}

function closeSettings(){
  document
    .getElementById("settingsOverlay")
    .classList.remove("show");
}

function saveSettings(){

  localStorage.setItem(
    "currency",
    document.getElementById("currencySelect").value
  );

  localStorage.setItem(
    "language",
    document.getElementById("languageSelect").value
  );

  closeSettings();
}

</script>

</body>
</html>
