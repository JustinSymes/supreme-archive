<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Item</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  padding:20px;
}

.topbar{
  height:64px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.back{
  position:absolute;
  left:0;
  color:#e10600;
  font-weight:700;
  cursor:pointer;
}

.title{
  font-weight:800;
  font-size:20px;
}

.form{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-top:24px;
}

input{
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}

button{
  padding:14px;
  border:0;
  border-radius:12px;
  background:#e10600;
  color:white;
  font-weight:800;
  font-size:16px;
}

#status{
  margin-top:16px;
  text-align:center;
  font-weight:700;
}

.request-note{
  margin-top:22px;
  text-align:center;
  font-size:14px;
  line-height:1.6;
  color:#666;
  font-family:'Special Elite', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}
  
</style>
</head>

<body>


<div id="status"></div>
<div class="request-note">
  Items are added regularly.<br><br>

  Send a request and most items are added within
  10 minutes — 24 hours.<br><br>

  FOOTWEAR COMING SOON.
</div>

<div class="topbar">
  <div class="back" id="backText" onclick="history.back()">← Back</div>
  <div class="title" id="titleText">Request Item</div>
</div>

<div class="form">
  <input id="email" placeholder="Your email (optional)">
  <input id="itemName" placeholder="Item name">
  <input id="season" placeholder="Season">
  <button id="submitBtn" onclick="submitRequest()">Submit</button>
</div>

<div id="status"></div>

<script src="lang.js"></script>
  
<script>

function applyLanguage(){
  setText("backText", "back");
  setText("titleText", "requestItem");
  setPlaceholder("email", "yourEmail");
  setPlaceholder("itemName", "itemName");
  setPlaceholder("season", "season");
  setText("submitBtn", "submit");
}

applyLanguage();

async function submitRequest(){

  const email = document.getElementById("email").value.trim();
  const itemName = document.getElementById("itemName").value.trim();
  const season = document.getElementById("season").value.trim();
  const status = document.getElementById("status");

  if(!itemName){
    status.textContent = t("enterItemName") || "Enter item name";
    return;
  }

  if(!season){
    status.textContent = t("enterSeason") || "Enter season";
    return;
  }

  status.textContent = t("sending") || "Sending...";

  const formData = new FormData();

  formData.append("access_key", "7732ed9c-85fa-41ae-891e-ee25e31eb297");
  formData.append("subject", "Supreme Archive Item Request");
  formData.append("from_name", "Supreme Archive App");
  formData.append("Item Name", itemName);
  formData.append("Season", season);

  if(email){
    formData.append("User Email", email);
  }

  try{
    const res = await fetch("https://api.web3forms.com/submit", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if(data.success){
      status.textContent = t("requestSent") || "Request sent ✓";

      document.getElementById("email").value = "";
      document.getElementById("itemName").value = "";
      document.getElementById("season").value = "";
    } else {
      status.textContent = t("couldNotSend") || "Could not send request";
    }

  } catch(err){
    status.textContent = t("errorSending") || "Error sending request";
  }
}
</script>

</body>
</html>
