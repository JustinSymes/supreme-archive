<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#fff;
}

.header{
  text-align:center;
  padding:16px;
  font-weight:700;
  font-size:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#f8f8f8;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  display:block;
}
.topbar{
  height:64px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:0 16px;
}

.back{
  justify-self:start;
  color:#e10600;
  font-weight:600;
  text-decoration:none;
  font-size:18px;
}

.title{
  justify-self:center;
  font-size:20px;
  font-weight:700;
}
</style>
</head>

<body>

<div class="topbar">
  <a class="back" href="fit.html">← Back</a>
  <div class="title">Your Fits</div>
  <div></div>
</div>
  
<div class="header">Your Fits</div>

<div class="grid" id="grid"></div>

<script>

const fits = JSON.parse(localStorage.getItem("savedFits") || "[]");
const grid = document.getElementById("grid");

fits.forEach(fit => {

  const card = document.createElement("div");
  card.className = "card";

  const img = document.createElement("img");
  img.src = fit.img;

  card.appendChild(img);
  grid.appendChild(card);



});

</script>

</body>
</html>
