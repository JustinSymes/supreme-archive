<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saved Supreme Outfits | Supreme Archive</title>
<meta name="description" content="View, edit, and download outfits created with the Supreme Archive outfit builder.">
<meta name="robots" content="index, follow, max-image-preview:large">
<link rel="canonical" href="https://supremearchive.net/fits.html">

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background:#fff;
}

.header{
  text-align:center;
  padding:16px;
  font-weight:700;
  font-size:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#f8f8f8;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  display:block;
}

.topbar{
  height:64px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:0 16px;
}

.back{
  justify-self:start;
  color:#e10600;
  font-weight:600;
  text-decoration:none;
  font-size:18px;
}

.title{
  justify-self:center;
  font-size:20px;
  font-weight:700;
}
</style>
</head>

<body>

<div class="topbar">
  <a class="back" id="backText" href="fit.html">← Back</a>
  <div class="title" id="titleText">Your Fits</div>
  <div></div>
</div>

<div class="grid" id="grid"></div>

<script src="lang.js"></script>

<script>

function applyLanguage(){
  setText("backText", "back");
  setText("titleText", "yourFits");
}

applyLanguage();

function downloadImage(dataUrl){
  const link = document.createElement("a");
  link.href = dataUrl;
  link.download = "fit.png";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

let dragIndex = null;
let fits = JSON.parse(localStorage.getItem("savedFits") || "[]");
const grid = document.getElementById("grid");

function saveFits(){
  localStorage.setItem("savedFits", JSON.stringify(fits));
}

function renderFits(){
  grid.innerHTML = "";

  fits.forEach((fit, index) => {

    const card = document.createElement("div");
    card.className = "card";

    card.draggable = true;

    card.ondragstart = () => {
      dragIndex = index;
    };

    card.ondragover = (e) => {
      e.preventDefault();
    };

    card.ondrop = () => {
      if(dragIndex === null) return;

      const moved = fits.splice(dragIndex,1)[0];
      fits.splice(index,0,moved);

      saveFits();
      renderFits();
    };

    const img = document.createElement("img");
    img.src = fit.img;

    img.onclick = () => openViewer(index);

    const nameRow = document.createElement("div");
    nameRow.style.display = "flex";
    nameRow.style.alignItems = "center";
    nameRow.style.justifyContent = "space-between";
    nameRow.style.padding = "6px 8px";

    const name = document.createElement("div");
    name.textContent = fit.name || t("tapToName");
    name.style.fontSize = "14px";
    name.style.cursor = "pointer";

    name.onclick = () => {
      const newName = prompt(t("nameThisFit"), fit.name || "");
      if(newName !== null){
        fits[index].name = newName;
        saveFits();
        renderFits();
      }
    };

    const del = document.createElement("div");
    del.textContent = "🗑";
    del.style.cursor = "pointer";

    del.onclick = () => {
      fits.splice(index,1);
      saveFits();
      renderFits();
    };

    nameRow.appendChild(name);
    nameRow.appendChild(del);

    card.appendChild(img);
    card.appendChild(nameRow);

    grid.appendChild(card);
  });
}

renderFits();

function openViewer(index){

  const viewer = document.createElement("div");
  viewer.style.position = "fixed";
  viewer.style.top = "0";
  viewer.style.left = "0";
  viewer.style.width = "100%";
  viewer.style.height = "100%";
  viewer.style.background = "#fff";
  viewer.style.display = "flex";
  viewer.style.flexDirection = "column";
  viewer.style.zIndex = "999";

  const topbar = document.createElement("div");
  topbar.style.display = "flex";
  topbar.style.justifyContent = "space-between";
  topbar.style.alignItems = "center";
  topbar.style.padding = "16px";

  const back = document.createElement("div");
  back.textContent = t("back");
  back.style.color = "#e10600";
  back.style.fontWeight = "600";
  back.style.cursor = "pointer";

  back.onclick = () => document.body.removeChild(viewer);

  const edit = document.createElement("div");
  edit.textContent = t("loadInBuilder");
  edit.style.color = "#e10600";
  edit.style.fontWeight = "700";
  edit.style.cursor = "pointer";

  edit.onclick = () => {
    localStorage.setItem("editFit", JSON.stringify(fits[index]));
    window.location.href = "fit.html";
  };

  const save = document.createElement("div");
  save.textContent = t("save");
  save.style.color = "#e10600";
  save.style.fontWeight = "700";
  save.style.cursor = "pointer";

  save.onclick = () => downloadImage(fits[index].img);

  topbar.appendChild(back);
  topbar.appendChild(edit);
  topbar.appendChild(save);

  const img = document.createElement("img");
  img.src = fits[index].img;
  img.style.width = "100%";
  img.style.flex = "1";
  img.style.objectFit = "contain";

  viewer.appendChild(topbar);
  viewer.appendChild(img);

  document.body.appendChild(viewer);
}

</script>

<!-- End Cloudflare Web Analytics -->
</body>
</html>
