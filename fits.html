<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#fff;
}

.header{
  text-align:center;
  padding:16px;
  font-weight:700;
  font-size:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#f8f8f8;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  display:block;
}
.topbar{
  height:64px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:0 16px;
}

.back{
  justify-self:start;
  color:#e10600;
  font-weight:600;
  text-decoration:none;
  font-size:18px;
}

.title{
  justify-self:center;
  font-size:20px;
  font-weight:700;
}
</style>
</head>

<body>

<div class="topbar">
  <a class="back" href="fit.html">← Back</a>
  <div class="title">Your Fits</div>
  <div></div>
</div>
  
<div class="header">Your Fits</div>

<div class="grid" id="grid"></div>

<script>

let fits = JSON.parse(localStorage.getItem("savedFits") || "[]");
const grid = document.getElementById("grid");

function saveFits(){
  localStorage.setItem("savedFits", JSON.stringify(fits));
}

function renderFits(){
  grid.innerHTML = "";

  fits.forEach((fit, index) => {

    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = fit.img;

    // 🔍 FULLSCREEN VIEW
    img.onclick = () => openViewer(index);

    const nameRow = document.createElement("div");
    nameRow.style.display = "flex";
    nameRow.style.alignItems = "center";
    nameRow.style.justifyContent = "space-between";
    nameRow.style.padding = "6px 8px";

    const name = document.createElement("div");
    name.textContent = fit.name || "Tap to name";
    name.style.fontSize = "14px";
    name.style.cursor = "pointer";

    // ✏️ EDIT NAME
    name.onclick = () => {
      const newName = prompt("Name this fit:", fit.name || "");
      if(newName !== null){
        fits[index].name = newName;
        saveFits();
        renderFits();
      }
    };

    // 🗑 DELETE
    const del = document.createElement("div");
    del.textContent = "🗑";
    del.style.cursor = "pointer";

    del.onclick = () => {
      fits.splice(index,1);
      saveFits();
      renderFits();
    };

    nameRow.appendChild(name);
    nameRow.appendChild(del);

    card.appendChild(img);
    card.appendChild(nameRow);

    grid.appendChild(card);
  });
}

renderFits();


// 🔍 FULLSCREEN VIEW
function openViewer(index){

  const viewer = document.createElement("div");
  viewer.style.position = "fixed";
  viewer.style.top = "0";
  viewer.style.left = "0";
  viewer.style.width = "100%";
  viewer.style.height = "100%";
  viewer.style.background = "#fff";
  viewer.style.display = "flex";
  viewer.style.flexDirection = "column";
  viewer.style.zIndex = "999";

  const back = document.createElement("div");
  back.textContent = "← Back";
  back.style.padding = "16px";
  back.style.color = "#e10600";
  back.style.fontWeight = "600";
  back.style.cursor = "pointer";

  back.onclick = () => document.body.removeChild(viewer);

  const img = document.createElement("img");
  img.src = fits[index].img;
  img.style.width = "100%";
  img.style.flex = "1";
  img.style.objectFit = "contain";

  viewer.appendChild(back);
  viewer.appendChild(img);

  document.body.appendChild(viewer);
}

</script>

</body>
</html>
