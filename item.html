<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Helvetica, Arial, sans-serif; padding:20px; }
img { width:100%; max-width:400px; }
.back { color:#e10600; cursor:pointer; margin-bottom:15px; display:inline-block; }

.carousel {
  position: relative;
  overflow: hidden;
  width: 100%;
  max-width: 520px;
  margin: 18px auto 10px;
}

.track {
  display: flex;
  transition: transform 220ms ease;
}

.slide {
  min-width: 100%;
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 10px;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: #ddd;
}

.dot.active {
  background: #e10600;
}

.meta-row{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-top:14px;
  margin-bottom:6px;
}

.meta-left,
.meta-right{
  font-size:18px;
}

.label{
  color:#666;
  margin-right:6px;
}

.price-value{
  font-weight:800;
}

.price-toggle{
  color:#e10600;
  font-weight:700;
  cursor:pointer;
  margin-left:6px;
  user-select:none;
}
</style>
</head>

<body>

<div class="back" onclick="history.back()">← Back to Archive</div>
<div id="content"></div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const name = params.get("name");

fetch("https://docs.google.com/spreadsheets/d/1AP4KwfrGxdReQIcCQHcTtoMfMyYs_6Rd5xbCwAHh15w/export?format=csv&gid=0")
.then(res=>res.text())
.then(data=>{

  // ✅ FIXED CSV parsing
  const parsed = Papa.parse(data, { skipEmptyLines: true }).data;
  const rows = parsed.slice(1);

  let foundRow = null;

  rows.forEach(cols => {

    if(id){
  // match by sheet ID
  if(cols[0] === id){
    foundRow = cols;
  }

  // 🔥 fallback: match by name for old items
  const myItems = JSON.parse(localStorage.getItem("myItems") || "[]");
  const oldItem = myItems.find(i => i.id === id);

  if(oldItem && cols[1] && cols[1].toLowerCase() === oldItem.name.toLowerCase()){
    foundRow = cols;
  }
}

  });

  if(!foundRow){
    document.getElementById("content").innerHTML = "Item not found";
    return;
  }

  const cols = foundRow;

  // ✅ safe fallback
  const images = (cols[8] || "")
  .split("|")
  .map(s => s.trim())
  .filter(Boolean);
  console.log(images);
  const priceCad = cols[10];
  const priceUsd = cols[11];

  let displaySize = cols[3] || "";

// check if user owns item
const myItems = JSON.parse(localStorage.getItem("myItems") || "[]");

const owned = myItems.find(i =>
  (id && i.id === id) ||
  (name && i.name && i.name.toLowerCase() === cols[1].toLowerCase())
);

if(owned && owned.size){
  displaySize = owned.size;
}
  
  document.getElementById("content").innerHTML = `
    <h2>${cols[1]}</h2>

    <div class="carousel">
      <div class="track" id="track"></div>
    </div>
    <div class="dots" id="dots"></div>

    <div class="meta-row">
      <div class="meta-left">
        <span class="label">Category:</span> ${cols[2] || ""}
      </div>

      <div class="meta-right">
        <span class="label">Retail:</span>
        <span class="price-value" id="priceValue"></span>
        <span class="price-toggle" id="priceToggle">CAD</span>
      </div>
    </div>

    <p>Size: ${displaySize}</p>
  `;

  buildCarousel(images);

  // 💰 PRICE TOGGLE
  let currency = "CAD";

  function formatMoney(n){
    const num = Number(String(n || "").replace(/[^0-9.]/g,""));
    if (!num) return "";
    return "$" + (num % 1 === 0 ? num.toFixed(0) : num.toFixed(2));
  }

  function renderPrice(){
    const pv = document.getElementById("priceValue");
    const pt = document.getElementById("priceToggle");

    if (!pv || !pt) return;

    if (!priceCad && !priceUsd){
      pv.textContent = "";
      pt.style.display = "none";
      return;
    }

    if(currency === "CAD"){
      pv.textContent = formatMoney(priceCad);
      pt.textContent = "CAD";
    } else {
      pv.textContent = formatMoney(priceUsd);
      pt.textContent = "USD";
    }
  }

  renderPrice();

  document.getElementById("priceToggle")?.addEventListener("click", () => {
    currency = currency === "CAD" ? "USD" : "CAD";
    renderPrice();
  });

});


// 📸 CAROUSEL
function buildCarousel(images){
  const track = document.getElementById("track");
  const dots = document.getElementById("dots");

  if (!track || !dots) return;

  track.innerHTML = "";
  dots.innerHTML = "";

  if (images.length <= 1) {
    dots.style.display = "none";
  }

  images.forEach((src, i) => {
    if(!src) return;

    const slide = document.createElement("div");
    slide.className = "slide";
    slide.innerHTML = `<img src="${src.trim()}">`;
    track.appendChild(slide);

    if (images.length > 1) {
      const dot = document.createElement("div");
      dot.className = "dot" + (i === 0 ? " active" : "");
      dots.appendChild(dot);
    }
  });

  let index = 0;

  const setIndex = (i) => {
    index = Math.max(0, Math.min(images.length - 1, i));
    track.style.transform = `translateX(${-index * 100}%)`;

    [...dots.children].forEach((d, di) =>
      d.classList.toggle("active", di === index)
    );
  };

  let startX = 0;
  let startY = 0;
  let isHorizontal = false;

  const container = track.parentElement;

  container.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isHorizontal = false;
  }, {passive:true});

  container.addEventListener("touchmove", e => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    if(Math.abs(dx) > Math.abs(dy)){
      isHorizontal = true;
      e.preventDefault();
    }
  }, {passive:false});

  container.addEventListener("touchend", e => {
    if(!isHorizontal) return;

    const endX = e.changedTouches[0].clientX;

    if (endX < startX - 50) setIndex(index + 1);
    if (endX > startX + 50) setIndex(index - 1);
  });
}

</script>

</body>
</html>
