<script>
async function saveFit(){

  const controls = document.querySelector(".fit-controls");

  /* hide buttons */
  controls.style.display = "none";

  /* create clean export container */
  const exportBox = document.createElement("div");

  exportBox.style.position = "fixed";
  exportBox.style.left = "-9999px";
  exportBox.style.top = "-9999px";
  exportBox.style.width = "1080px";
  exportBox.style.height = "1920px";
  exportBox.style.background = "#ffffff";

  exportBox.style.display = "flex";
  exportBox.style.flexDirection = "column";
  exportBox.style.alignItems = "center";
  exportBox.style.justifyContent = "center";
  exportBox.style.gap = "70px";

  /* clone images */
  const hat = hatImg.cloneNode();
  const acc = accImg.cloneNode();
  const top = topImg.cloneNode();
  const bot = botImg.cloneNode();

  const baseWidth = 1080;

  /* ✅ CLEAN SIZING (NO STRETCHING) */

  // Hat
  hat.style.width = baseWidth * 0.22 + "px";
  hat.style.height = "auto";
  hat.style.objectFit = "contain";
  hat.style.display = "block";

  // Accessory
  acc.style.width = baseWidth * 0.22 + "px";
  acc.style.height = "auto";
  acc.style.objectFit = "contain";
  acc.style.display = "block";

  // Top
  top.style.width = baseWidth * 0.55 + "px";
  top.style.height = "auto";
  top.style.objectFit = "contain";
  top.style.display = "block";

  // Bottom (FIXED — no more size inconsistency)
  bot.style.width = baseWidth * 0.55 + "px";
  bot.style.height = "auto";
  bot.style.objectFit = "contain";
  bot.style.display = "block";

  /* ✅ WRAPPER (prevents flex distortion) */
  function wrap(img){
    const box = document.createElement("div");
    box.style.display = "flex";
    box.style.alignItems = "center";
    box.style.justifyContent = "center";
    return box.appendChild(img).parentNode;
  }

  /* top row */
  const hatRow = document.createElement("div");
  hatRow.style.display = "flex";
  hatRow.style.gap = "100px";
  hatRow.appendChild(wrap(hat));
  hatRow.appendChild(wrap(acc));

  exportBox.appendChild(hatRow);
  exportBox.appendChild(top);
  exportBox.appendChild(bot);

  document.body.appendChild(exportBox);

  const canvas = await html2canvas(exportBox,{
    backgroundColor:"#ffffff",
    scale:2,
    useCORS:true
  });

  document.body.removeChild(exportBox);

  controls.style.display = "flex";

  /* download */
  const now = new Date();
  const date =
    now.getFullYear()+"-"+
    String(now.getMonth()+1).padStart(2,"0")+"-"+
    String(now.getDate()).padStart(2,"0");

  const link = document.createElement("a");
  link.href = canvas.toDataURL("image/png");
  link.download = `fit-${date}.png`;

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>
