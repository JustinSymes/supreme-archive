<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Build a Fit</title>

<style>
:root{
  --red:#e10600;
  --pad:16px;
  --topbar-h:64px;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  background:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"San Francisco",Arial,sans-serif;
  color:#111;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* Top bar */
.topbar{
  height:var(--topbar-h);
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:0 var(--pad);
}

.back{
  justify-self:start;
  color:var(--red);
  font-weight:600;
  text-decoration:none;
  font-size:18px;
}

.title{
  justify-self:center;
  font-size:22px;
  font-weight:700;
}

/* Stage */
.stage{
  position:relative;
  height:calc(100vh - var(--topbar-h));
  padding:10px var(--pad) 18px;
  display:grid;
  grid-template-rows:28% 38% 34%;
  row-gap:10px;
}

/* Buttons */
.fit-controls{
  position:absolute;
  left:var(--pad);
  right:var(--pad);
  top:8px;
  display:flex;
  justify-content:space-between;
}

.fit-btn{
  background:transparent;
  border:0;
  color:var(--red);
  font-size:18px;
  font-weight:700;
}

/* Layout */
.row-top{
  display:grid;
  grid-template-columns:1fr 1fr;
  column-gap:18px;
  align-items:center;
  padding-top:32px;
}

.row-mid,
.row-bot{
  display:flex;
  align-items:center;
  justify-content:center;
}

.row-mid{ transform:translateY(-40px); }
.row-bot{ transform:translateY(-50px); }

/* Slots */
.slot{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.slot img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}
</style>
</head>

<body>

<div class="topbar">
<a class="back" href="index.html">← Back</a>
<div class="title">Build a Fit</div>
<div></div>
</div>

<div class="stage" id="capture">

<div class="fit-controls">
<button class="fit-btn" id="randomBtn">Random</button>
<button class="fit-btn" id="saveBtn">Save</button>
</div>

<div class="row-top">
<div class="slot"><img id="hatImg"></div>
<div class="slot"><img id="accImg"></div>
</div>

<div class="row-mid">
<div class="slot"><img id="topImg"></div>
</div>

<div class="row-bot">
<div class="slot"><img id="botImg"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1AP4KwfrGxdReQIcCQHcTtoMfMyYs_6Rd5xbCwAHh15w/export?format=csv&gid=0";

let tops=[], bottoms=[], hats=[], accs=[];
const BLANK={name:"",src:""};

let idxTop=0, idxBot=0, idxHat=0, idxAcc=0;

const topImg=document.getElementById("topImg");
const botImg=document.getElementById("botImg");
const hatImg=document.getElementById("hatImg");
const accImg=document.getElementById("accImg");

function setImg(img,src){
  if(!src){
    img.style.display="none";
  }else{
    img.src=src;
    img.style.display="block";
  }
}

function render(){
  setImg(topImg,tops[idxTop]?.src);
  setImg(botImg,bottoms[idxBot]?.src);
  setImg(hatImg,hats[idxHat]?.src);
  setImg(accImg,accs[idxAcc]?.src);
}

function rand(n){ return Math.floor(Math.random()*n); }

function randomize(){
  if(tops.length) idxTop=rand(tops.length);
  if(bottoms.length) idxBot=rand(bottoms.length);
  if(hats.length) idxHat=rand(hats.length);
  if(accs.length) idxAcc=rand(accs.length);
  render();
}

async function saveFit(){

  const controls=document.querySelector(".fit-controls");
  controls.style.display="none";

  const exportBox=document.createElement("div");

  exportBox.style.position="fixed";
  exportBox.style.left="-9999px";
  exportBox.style.width="1080px";
  exportBox.style.height="1920px";
  exportBox.style.background="#fff";

  exportBox.style.display="flex";
  exportBox.style.flexDirection="column";
  exportBox.style.alignItems="center";
  exportBox.style.justifyContent="center";
  exportBox.style.gap="120px";

  function makeSlot(img,height,scale=1){
    const slot=document.createElement("div");
    slot.style.width="80%";
    slot.style.height=height+"px";
    slot.style.display="flex";
    slot.style.alignItems="center";
    slot.style.justifyContent="center";

    img.style.maxWidth="100%";
    img.style.maxHeight="100%";
    img.style.objectFit="contain";

    /* auto scale fix */
    let finalScale=scale;

    if(img.naturalWidth && img.naturalWidth < 500){
      finalScale*=1.2;
    }

    img.style.transform=`scale(${finalScale})`;

    slot.appendChild(img);
    return slot;
  }

  const hat=hatImg.cloneNode();
  const acc=accImg.cloneNode();
  const top=topImg.cloneNode();
  const bot=botImg.cloneNode();

  const hatRow=document.createElement("div");
  hatRow.style.display="flex";
  hatRow.style.width="80%";
  hatRow.style.justifyContent="space-between";
  hatRow.style.height="250px";

  hatRow.appendChild(makeSlot(hat,250,1.05));
  hatRow.appendChild(makeSlot(acc,250,0.95));

  exportBox.appendChild(hatRow);
  exportBox.appendChild(makeSlot(top,700,1));
  exportBox.appendChild(makeSlot(bot,700,1.1));

  document.body.appendChild(exportBox);

  const canvas=await html2canvas(exportBox,{
    backgroundColor:"#fff",
    scale:2,
    useCORS:true
  });

  document.body.removeChild(exportBox);
  controls.style.display="flex";

  const link=document.createElement("a");
  link.href=canvas.toDataURL("image/png");
  link.download="fit.png";
  link.click();
}

document.getElementById("randomBtn").onclick=randomize;
document.getElementById("saveBtn").onclick=saveFit;

fetch(sheetURL)
.then(r=>r.text())
.then(data=>{
  const rows=data.split("\n").slice(1);

  const items=rows.map(r=>r.split(",")).map(c=>({
    category:c[2]?.trim(),
    src:c[8]?.split("|")[0]?.trim()
  }));

  tops=items.filter(i=>i.category==="Tops");
  bottoms=items.filter(i=>i.category==="Bottoms");
  hats=[BLANK,...items.filter(i=>i.category==="Headwear")];
  accs=[BLANK,...items.filter(i=>i.category==="Accessories")];

  render();
});
</script>

</body>
</html>
