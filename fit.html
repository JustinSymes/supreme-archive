<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build a Fit</title>

  <style>
    :root{
      --red:#e10600;
      --pad:16px;
      --topbar-h:64px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"San Francisco",Arial,sans-serif;
      color:#111;
      overflow:hidden; /* keep 1 screen */
      -webkit-tap-highlight-color: transparent;
    }

    /* Top bar (Back + Title only) */
    .topbar{
      height:var(--topbar-h);
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      padding:0 var(--pad);
    }
    .back{
      justify-self:start;
      color:var(--red);
      font-weight:600;
      text-decoration:none;
      font-size:18px;
    }
    .title{
      justify-self:center;
      font-size:22px;
      font-weight:700;
    }
    .right-spacer{ justify-self:end; }

    /* Stage area (everything that gets saved) */
    .stage{
      position:relative;
      height:calc(100vh - var(--topbar-h));
      padding:10px var(--pad) 18px;
      display:grid;
      grid-template-rows: 28% 38% 34%; /* hat/acc | top | bottom */
      row-gap:10px;
    }

    /* Random + Save placement like your reference */
    .fit-controls{
      position:absolute;
      left:var(--pad);
      right:var(--pad);
      top:8px;               /* below header */
      display:flex;
      justify-content:space-between;
      z-index:5;
      pointer-events:auto;
    }
    .fit-btn{
      background:transparent;
      border:0;
      padding:0;
      color:var(--red);
      font-size:18px;
      font-weight:700;
      cursor:pointer;
    }

    /* Row 1: hat left, accessory right */
    .row-top{
      display:grid;
      grid-template-columns: 1fr 1fr;
      column-gap:18px;
      align-items:center;
      padding-top:32px;      /* moves hat+acc DOWN slightly */
    }

    /* Slot base */
    .slot{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      user-select:none;
      touch-action:pan-y;
    }

    /* Make swipe work even if blank */
    .slot::after{
      content:"";
      position:absolute;
      inset:-10px;
    }

    /* Images */
    .slot img{
      width:auto;
      height:auto;
      object-fit:contain;
      display:block;
      pointer-events:none;
    }

    /* Mid + bottom rows centered */
    .row-mid{
  display:flex;
  align-items:center;
  justify-content:center;
  transform:translateY(-10px); /* moves shirt up */
}

.row-bot{
  display:flex;
  align-items:center;
  justify-content:center;
  transform:translateY(-12px); /* moves pants up */
}

    /* Hat bigger */
    .slot.hat img{
  max-height:95%;
  max-width:100%;
}

    /* Accessory bigger + moved down already via padding */
    .slot.acc img{
      max-height:82%;
      max-width:92%;
    }

    /* Shirt smaller */
    .slot.top img{
  max-height:78%;
  max-width:90%;
}

    /* Pants up + not cut off */
    .row-bot{
  align-items:flex-start;
  transform:translateY(-10px);
}
    .slot.bottom img{
      max-height:92%;
      max-width:92%;
    }

    /* Blank handling */
    .blankHint{
      position:absolute;
      font-size:12px;
      color:#bbb;
      opacity:0; /* keep hidden */
    }
    .slot.blank .blankHint{ opacity:0; }

    .no-select{
      -webkit-user-select:none;
      user-select:none;
    }
  </style>
</head>

<body>
  <div class="topbar" id="topbar">
    <a class="back" href="index.html">← Back</a>
    <div class="title">Build a Fit</div>
    <div class="right-spacer"></div>
  </div>

  <!-- Everything inside #capture is what we "Save" -->
  <div class="stage no-select" id="capture">
    <div class="fit-controls" id="fitControls">
      <button class="fit-btn" id="randomBtn">Random</button>
      <button class="fit-btn" id="saveBtn">Save</button>
    </div>

    <div class="row-top">
      <div class="slot hat" id="hatSlot">
        <span class="blankHint">No Hat</span>
        <img id="hatImg" alt="Hat" />
      </div>

      <div class="slot acc" id="accSlot">
        <span class="blankHint">No Accessory</span>
        <img id="accImg" alt="Accessory" />
      </div>
    </div>

    <div class="row-mid">
      <div class="slot top" id="topSlot">
        <img id="topImg" alt="Top" />
      </div>
    </div>

    <div class="row-bot">
      <div class="slot bottom" id="botSlot">
        <img id="botImg" alt="Bottom" />
      </div>
    </div>
  </div>

  <!-- Needed for real PNG saving -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
    const sheetURL =
      "https://docs.google.com/spreadsheets/d/1AP4KwfrGxdReQIcCQHcTtoMfMyYs_6Rd5xbCwAHh15w/export?format=csv&gid=0";

    const splitCSVLine = (line) => line.split(",");

    let tops = [];
    let bottoms = [];
    let hats = [];
    let accs = [];

    const BLANK = { name: "", src: "" };

    let idxTop = 0, idxBot = 0, idxHat = 0, idxAcc = 0;

    function setImg(imgEl, slotEl, src){
      const trimmed = (src || "").trim();
      if (!trimmed) {
        imgEl.removeAttribute("src");
        imgEl.style.display = "none";
        slotEl.classList.add("blank");
      } else {
        imgEl.src = trimmed;
        imgEl.style.display = "block";
        slotEl.classList.remove("blank");
      }
    }

    function render(){
      setImg(document.getElementById("topImg"), document.getElementById("topSlot"), tops[idxTop]?.src);
      setImg(document.getElementById("botImg"), document.getElementById("botSlot"), bottoms[idxBot]?.src);
      setImg(document.getElementById("hatImg"), document.getElementById("hatSlot"), hats[idxHat]?.src);
      setImg(document.getElementById("accImg"), document.getElementById("accSlot"), accs[idxAcc]?.src);
    }

    function attachSwipe(slotEl, getList, getIndex, setIndex){
      let startX = 0;
      let startY = 0;

      slotEl.addEventListener("touchstart", (e) => {
        const t = e.touches[0];
        startX = t.clientX;
        startY = t.clientY;
      }, { passive:true });

      slotEl.addEventListener("touchend", (e) => {
        const t = e.changedTouches[0];
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;

        if (Math.abs(dx) < 45 || Math.abs(dx) < Math.abs(dy)) return;

        const list = getList();
        if (!list || list.length <= 1) return;

        const cur = getIndex();
        if (dx < 0) setIndex((cur + 1) % list.length);
        else setIndex((cur - 1 + list.length) % list.length);

        render();
      }, { passive:true });
    }

    function randInt(n){ return Math.floor(Math.random() * n); }

    function randomize(){
      if (tops.length) idxTop = randInt(tops.length);
      if (bottoms.length) idxBot = randInt(bottoms.length);
      if (hats.length) idxHat = randInt(hats.length);
      if (accs.length) idxAcc = randInt(accs.length);
      render();
    }

    async function saveFit(){

  const stage = document.getElementById("capture");

  /* clone stage so layout doesn't change */
  const clone = stage.cloneNode(true);

  clone.style.position = "fixed";
  clone.style.top = "-9999px";
  clone.style.left = "-9999px";

  /* perfect vertical export layout */
  clone.style.width = "2160px";
  clone.style.height = "3840px";

  clone.style.padding = "200px"; /* adds nice white margins */

  clone.style.transform = "none";
  clone.style.display = "grid";

  document.body.appendChild(clone);

  const canvas = await html2canvas(clone,{
    backgroundColor:"#ffffff",
    width:2160,
    height:3840,
    scale:2
  });

  document.body.removeChild(clone);

  /* create filename like fit-2026-03-08.png */
  const now = new Date();
  const date =
    now.getFullYear() + "-" +
    String(now.getMonth()+1).padStart(2,"0") + "-" +
    String(now.getDate()).padStart(2,"0");

  const link = document.createElement("a");
  link.download = `fit-${date}.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
}

  document.body.removeChild(clone);

  const link = document.createElement("a");
  link.download = "fit.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

      // Restore UI
      topbar.style.display = "";
      controls.style.display = "";

      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = "fit.png";
      a.click();
    }

    document.getElementById("randomBtn").addEventListener("click", randomize);
    document.getElementById("saveBtn").addEventListener("click", saveFit);

    fetch(sheetURL)
      .then(r => r.text())
      .then(csv => {
        const rows = csv.trim().split("\n").slice(1);

        const items = rows
          .map(line => splitCSVLine(line))
          .filter(cols => cols.length >= 9)
          .map(cols => ({
            name: (cols[1] || "").trim(),
            category: (cols[2] || "").trim(),
            src: (cols[8] || "").trim().split("|")[0].trim()
          }));

        tops = items.filter(i => i.category === "Tops");
        bottoms = items.filter(i => i.category === "Bottoms");

        hats = [BLANK, ...items.filter(i => i.category === "Headwear")];
        accs = [BLANK, ...items.filter(i => i.category === "Accessories")];

        idxHat = 0;
        idxAcc = 0;
        idxTop = 0;
        idxBot = 0;

        render();

        attachSwipe(document.getElementById("topSlot"), () => tops, () => idxTop, (v) => idxTop = v);
        attachSwipe(document.getElementById("botSlot"), () => bottoms, () => idxBot, (v) => idxBot = v);
        attachSwipe(document.getElementById("hatSlot"), () => hats, () => idxHat, (v) => idxHat = v);
        attachSwipe(document.getElementById("accSlot"), () => accs, () => idxAcc, (v) => idxAcc = v);
      });
  </script>
</body>
</html>
