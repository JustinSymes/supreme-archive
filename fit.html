<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Build a Fit</title>

<style>
:root{
  --red:#e10600;
  --pad:16px;
  --topbar-h:64px;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  background:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"San Francisco",Arial,sans-serif;
  color:#111;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* Top bar */
.topbar{
  height:var(--topbar-h);
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:0 var(--pad);
}

.back{
  justify-self:start;
  color:var(--red);
  font-weight:600;
  text-decoration:none;
  font-size:18px;
}

.title{
  justify-self:center;
  font-size:22px;
  font-weight:700;
}

.right-spacer{ justify-self:end; }

/* Stage */
.stage{
  position:relative;
  height:calc(100vh - var(--topbar-h));
  padding:10px var(--pad) 18px;
  display:grid;
  grid-template-rows:28% 38% 34%;
  row-gap:10px;
}

/* Buttons */
.fit-controls{
  position:absolute;
  left:var(--pad);
  right:var(--pad);
  top:8px;
  display:flex;
  justify-content:space-between;
}

.fit-btn{
  background:transparent;
  border:0;
  color:var(--red);
  font-size:18px;
  font-weight:700;
  cursor:pointer;
}

/* Rows */
.row-top{
  display:grid;
  grid-template-columns:1fr 1fr;
  column-gap:18px;
  align-items:center;
  padding-top:32px;
}

.row-mid{
  display:flex;
  align-items:center;
  justify-content:center;
  transform:translateY(-40px);
}

.row-bot{
  display:flex;
  align-items:center;
  justify-content:center;
  transform:translateY(-50px);
}

/* Slots */
.slot{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

.slot img{
  max-width:100%;
  max-height:100%;
  width:auto;
  height:auto;
  object-fit:contain;
  display:block;
}

/* Size adjustments */
.slot.hat img{
  max-height:95%;
}

.slot.acc img{
  max-height:75%;
  max-width:75%;
}

.slot.top img{
  max-height:79%;
}

.slot.bottom img{
  max-height:92%;
}

.blankHint{
  position:absolute;
  font-size:12px;
  color:#bbb;
  opacity:0;
}
</style>
</head>

<body>

<div class="topbar">
<a class="back" href="index.html">← Back</a>
<div class="title">Build a Fit</div>
<div></div>
</div>

<div class="stage" id="capture">

<div class="fit-controls">
<button class="fit-btn" id="randomBtn">Random</button>
<button class="fit-btn" id="fitsBtn">Fits</button>
<button class="fit-btn" id="saveFitBtn">+ Fit</button> 
<button class="fit-btn" id="saveBtn">Save</button>
</div>

<div class="row-top">

<div class="slot hat" id="hatSlot">
<span class="blankHint">Hat</span>
<img id="hatImg">
</div>

<div class="slot acc" id="accSlot">
<span class="blankHint">Accessory</span>
<img id="accImg">
</div>

</div>

<div class="row-mid">
<div class="slot top" id="topSlot">
<img id="topImg">
</div>
</div>

<div class="row-bot">
<div class="slot bottom" id="botSlot">
<img id="botImg">
</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1AP4KwfrGxdReQIcCQHcTtoMfMyYs_6Rd5xbCwAHh15w/export?format=csv&gid=0";

let tops=[];
let bottoms=[];
let hats=[];
let accs=[];

const BLANK={name:"",src:""};

let idxTop=Number(localStorage.getItem("fitTop"))||0;
let idxBot=Number(localStorage.getItem("fitBot"))||0;
let idxHat=Number(localStorage.getItem("fitHat"))||0;
let idxAcc=Number(localStorage.getItem("fitAcc"))||0;

/* DOM references (fix for iOS bug) */

const topImg=document.getElementById("topImg");
const botImg=document.getElementById("botImg");
const hatImg=document.getElementById("hatImg");
const accImg=document.getElementById("accImg");

const topSlot=document.getElementById("topSlot");
const botSlot=document.getElementById("botSlot");
const hatSlot=document.getElementById("hatSlot");
const accSlot=document.getElementById("accSlot");

function setImg(img,slot,src){

const s=(src||"").trim();

if(!s){
img.removeAttribute("src");
img.style.display="none";
slot.classList.add("blank");
}else{
img.src=s;
img.style.display="block";
slot.classList.remove("blank");
}

}

function render(){

localStorage.setItem("fitTop",idxTop);
localStorage.setItem("fitBot",idxBot);
localStorage.setItem("fitHat",idxHat);
localStorage.setItem("fitAcc",idxAcc);

setImg(topImg,topSlot,tops[idxTop]?.src);
setImg(botImg,botSlot,bottoms[idxBot]?.src);
setImg(hatImg,hatSlot,hats[idxHat]?.src);
setImg(accImg,accSlot,accs[idxAcc]?.src);

}

function attachSwipe(slot,getList,getIndex,setIndex){

let startX=0;

slot.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
},{passive:true});

slot.addEventListener("touchend",e=>{

let dx=e.changedTouches[0].clientX-startX;

if(Math.abs(dx)<40) return;

let list=getList();

if(list.length<=1) return;

let cur=getIndex();

if(dx<0) setIndex((cur+1)%list.length);
else setIndex((cur-1+list.length)%list.length);

render();

},{passive:true});

}

function rand(n){
return Math.floor(Math.random()*n);
}

function randomize(){

if(tops.length) idxTop=rand(tops.length);
if(bottoms.length) idxBot=rand(bottoms.length);
if(hats.length) idxHat=rand(hats.length);
if(accs.length) idxAcc=rand(accs.length);

render();

}

function saveFitToGallery(canvas){

  const fits = JSON.parse(localStorage.getItem("savedFits") || "[]");

  const image = canvas.toDataURL("image/png");

  fits.unshift({
    img: image,
    date: Date.now()
  });

  localStorage.setItem("savedFits", JSON.stringify(fits));

  alert("Saved to Fits 🔥");
}  

async function saveToGalleryOnly(){

  const controls = document.querySelector(".fit-controls");
  controls.style.display = "none";

  try {

    const exportBox = document.createElement("div");

    exportBox.style.position = "fixed";
    exportBox.style.left = "-9999px";
    exportBox.style.top = "-9999px";
    exportBox.style.width = "1080px";
    exportBox.style.height = "1920px";
    exportBox.style.background = "#ffffff";

    exportBox.style.display = "flex";
    exportBox.style.flexDirection = "column";
    exportBox.style.alignItems = "center";
    exportBox.style.justifyContent = "space-between";
    exportBox.style.padding = "120px 0";

    function makeSlot(img, height){
      const slot = document.createElement("div");
      slot.style.width = "80%";
      slot.style.height = height + "px";
      slot.style.display = "flex";
      slot.style.alignItems = "center";
      slot.style.justifyContent = "center";

      img.style.maxWidth = "100%";
      img.style.maxHeight = "100%";
      img.style.objectFit = "contain";

      slot.appendChild(img);
      return slot;
    }

    const hat = hatImg.cloneNode();
    const acc = accImg.cloneNode();
    const top = topImg.cloneNode();
    const bot = botImg.cloneNode();

    const hatRow = document.createElement("div");
    hatRow.style.display = "flex";
    hatRow.style.width = "80%";
    hatRow.style.justifyContent = "space-between";
    hatRow.style.height = "250px";

    hatRow.appendChild(makeSlot(hat,250));
    hatRow.appendChild(makeSlot(acc,250));

    exportBox.appendChild(hatRow);
    exportBox.appendChild(makeSlot(top,700));
    exportBox.appendChild(makeSlot(bot,700));

    document.body.appendChild(exportBox);

    const canvas = await html2canvas(exportBox,{
      backgroundColor:"#ffffff",
      scale:2,
      useCORS:true
    });

    saveFitToGallery(canvas);

    document.body.removeChild(exportBox);

  } catch (err) {
    console.error(err);
  } finally {
    controls.style.display = "flex";
  }
}
  
async function saveFit(){

  const controls = document.querySelector(".fit-controls");
  controls.style.display = "none";

  const exportBox = document.createElement("div");

  exportBox.style.position = "fixed";
  exportBox.style.left = "-9999px";
  exportBox.style.top = "-9999px";
  exportBox.style.width = "1080px";
  exportBox.style.height = "1920px";
  exportBox.style.background = "#ffffff";

  exportBox.style.display = "flex";
  exportBox.style.flexDirection = "column";
  exportBox.style.alignItems = "center";
  exportBox.style.justifyContent = "space-between";
  exportBox.style.padding = "120px 0";

  function makeSlot(img, height){
    const slot = document.createElement("div");
    slot.style.width = "80%";
    slot.style.height = height + "px";
    slot.style.display = "flex";
    slot.style.alignItems = "center";
    slot.style.justifyContent = "center";

    img.style.maxWidth = "100%";
    img.style.maxHeight = "100%";
    img.style.objectFit = "contain";

    slot.appendChild(img);
    return slot;
  }

  const hat = hatImg.cloneNode();
  const acc = accImg.cloneNode();
  const top = topImg.cloneNode();
  const bot = botImg.cloneNode();

  const hatRow = document.createElement("div");
  hatRow.style.display = "flex";
  hatRow.style.width = "80%";
  hatRow.style.justifyContent = "space-between";
  hatRow.style.height = "250px";

  hatRow.appendChild(makeSlot(hat,250));
  hatRow.appendChild(makeSlot(acc,250));

  exportBox.appendChild(hatRow);
  exportBox.appendChild(makeSlot(top,700));
  exportBox.appendChild(makeSlot(bot,700));

  document.body.appendChild(exportBox);

  const canvas = await html2canvas(exportBox,{
    backgroundColor:"#ffffff",
    scale:2,
    useCORS:true
  });

  /* download */
  const now = new Date();
  const date =
    now.getFullYear()+"-"+
    String(now.getMonth()+1).padStart(2,"0")+"-"+
    String(now.getDate()).padStart(2,"0");

  const link = document.createElement("a");
  link.href = canvas.toDataURL("image/png");
  link.download = `fit-${date}.png`;

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  document.body.removeChild(exportBox);
  controls.style.display = "flex";
}

document.getElementById("randomBtn").onclick=randomize;
document.getElementById("saveBtn").onclick=saveFit;
document.getElementById("saveFitBtn").onclick = saveToGalleryOnly;
document.getElementById("fitsBtn").onclick = () => {
  window.location.href = "fits.html";
};

fetch(sheetURL)
.then(r=>r.text())
.then(data=>{

const rows=data.split("\n").slice(1);

const items=rows.map(r=>r.split(",")).map(c=>({

name:c[1]?.trim(),
category:c[2]?.trim(),
src:c[8]?.split("|")[0]?.trim()

}));

tops=items.filter(i=>i.category==="Tops");
bottoms=items.filter(i=>i.category==="Bottoms");

hats=[BLANK,...items.filter(i=>i.category==="Headwear")];
accs=[BLANK,...items.filter(i=>i.category==="Accessories")];

render();

attachSwipe(topSlot,()=>tops,()=>idxTop,v=>idxTop=v);
attachSwipe(botSlot,()=>bottoms,()=>idxBot,v=>idxBot=v);
attachSwipe(hatSlot,()=>hats,()=>idxHat,v=>idxHat=v);
attachSwipe(accSlot,()=>accs,()=>idxAcc,v=>idxAcc=v);

});

</script>

</body>
</html>
