<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build a Fit</title>

<style>
:root{
  --red:#e10600;
  --pad:16px;
  --topbar-h:64px;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  background:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"San Francisco",Arial,sans-serif;
  color:#111;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* Top bar */
.topbar{
  height:var(--topbar-h);
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:0 var(--pad);
}

.back{
  justify-self:start;
  color:var(--red);
  font-weight:600;
  text-decoration:none;
  font-size:18px;
}

.title{
  justify-self:center;
  font-size:22px;
  font-weight:700;
}

.settings-link{
  justify-self:end;
  background:transparent;
  border:0;
  padding:0;
  color:var(--red);
  font:inherit;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
}

.settings-overlay{
  position:fixed;
  inset:0;
  z-index:1000;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:rgba(0,0,0,.35);
}

.settings-overlay.show{ display:flex; }

.settings-modal{
  width:min(420px,100%);
  padding:24px;
  border-radius:16px;
  background:#fff;
  box-shadow:0 12px 40px rgba(0,0,0,.2);
}

.settings-modal h2{ margin:0 0 8px; }
.settings-modal p{ margin:0 0 22px; color:#666; }

.setting-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  padding:14px 0;
  font-weight:600;
}

.switch{
  position:relative;
  width:52px;
  height:30px;
  flex-shrink:0;
}

.switch input{ display:none; }

.slider{
  position:absolute;
  inset:0;
  border-radius:999px;
  background:#d1d1d6;
  transition:.25s;
}

.slider:before{
  content:"";
  position:absolute;
  left:2px;
  top:2px;
  width:26px;
  height:26px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.25);
  transition:.25s;
}

.switch input:checked + .slider{ background:var(--red); }
.switch input:checked + .slider:before{ transform:translateX(22px); }

.settings-close{
  width:100%;
  margin-top:16px;
  padding:12px;
  border:0;
  border-radius:10px;
  background:#eee;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

/* Stage */
.stage{
  position:relative;
  height:calc(100vh - var(--topbar-h));
  padding:10px var(--pad) 18px;
  display:grid;
  grid-template-rows:28% 38% 34%;
  row-gap:10px;
}

/* Buttons */
.fit-controls{
  position:absolute;
  left:var(--pad);
  right:var(--pad);
  top:8px;
  display:flex;
  justify-content:space-between;
}

.fit-btn{
  background:transparent;
  border:0;
  color:var(--red);
  font-size:18px;
  font-weight:700;
  cursor:pointer;
}

/* Rows */
.row-top{
  display:grid;
  grid-template-columns:1fr 1fr;
  column-gap:18px;
  align-items:center;
  padding-top:32px;
}

.row-mid{
  display:flex;
  align-items:center;
  justify-content:center;
  transform:translateY(-40px);
}

.row-bot{
  display:flex;
  align-items:center;
  justify-content:center;
  transform:translateY(-50px);
}

/* Slots */
.slot{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

.slot img{
  max-width:100%;
  max-height:100%;
  width:auto;
  height:auto;
  object-fit:contain;
  display:block;
}

/* Size adjustments */
.slot.hat img{ max-height:95%; }
.slot.acc img{ max-height:75%; max-width:75%; }
.slot.top img{ max-height:79%; }
.slot.bottom img{ max-height:92%; }

.blankHint{
  position:absolute;
  font-size:12px;
  color:#bbb;
  opacity:0;
}

#toast{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#111;
  color:#fff;
  padding:10px 16px;
  border-radius:20px;
  font-size:14px;
  opacity:0;
  transition:all 0.3s ease;
  pointer-events:none;
}

#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<div class="topbar">
  <a class="back" id="backText" href="index.html">← Back</a>
  <div class="title" id="titleText">Build a Fit</div>
  <button class="settings-link" id="settingsLink" onclick="openFitSettings()">Settings</button>
</div>

<div class="settings-overlay" id="fitSettingsOverlay" onclick="closeFitSettings(event)">
  <div class="settings-modal" onclick="event.stopPropagation()">
    <h2 id="fitSettingsTitle">Settings</h2>
    <p id="fitSettingsSub">Customize Supreme Archive features.</p>
    <div class="setting-row">
      <span id="fitEntireArchiveText">Entire Archive in Build a Fit</span>
      <label class="switch">
        <input type="checkbox" id="fitEntireArchiveToggle">
        <span class="slider"></span>
      </label>
    </div>
    <button class="settings-close" id="fitSettingsClose" onclick="closeFitSettings()">Close</button>
  </div>
</div>

<div class="stage" id="capture">

<div class="fit-controls">
  <button class="fit-btn" id="randomBtn">Random</button>
  <button class="fit-btn" id="fitsBtn">Fits</button>
  <button class="fit-btn" id="saveFitBtn">+ Fit</button> 
  <button class="fit-btn" id="saveBtn">Save</button>
</div>

<div class="row-top">
  <div class="slot hat" id="hatSlot">
    <span class="blankHint">Hat</span>
    <img id="hatImg">
  </div>

  <div class="slot acc" id="accSlot">
    <span class="blankHint">Accessory</span>
    <img id="accImg">
  </div>
</div>

<div class="row-mid">
  <div class="slot top" id="topSlot">
    <img id="topImg">
  </div>
</div>

<div class="row-bot">
  <div class="slot bottom" id="botSlot">
    <img id="botImg">
  </div>
</div>

</div>

<script src="lang.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

function applyLanguage(){
  setText("backText", "back");
  setText("titleText", "buildFit");
  setText("randomBtn", "random");
  setText("fitsBtn", "fits");
  setText("saveBtn", "save");
  setText("settingsLink", "appSettings");
  setText("fitSettingsTitle", "appSettings");
  setText("fitSettingsSub", "appSettingsSub");
  setText("fitEntireArchiveText", "entireArchive");
  setText("fitSettingsClose", "close");
}

applyLanguage();

function openFitSettings(){
  document.getElementById("fitEntireArchiveToggle").checked =
    localStorage.getItem("fitArchiveMode") === "all";
  document.getElementById("fitSettingsOverlay").classList.add("show");
}

function closeFitSettings(event){
  if(event && event.target !== event.currentTarget) return;
  document.getElementById("fitSettingsOverlay").classList.remove("show");
}

document.getElementById("fitEntireArchiveToggle").addEventListener("change", event=>{
  localStorage.setItem("fitArchiveMode", event.target.checked ? "all" : "user");
  location.reload();
});


// prevent iOS double-tap zoom but still allow pinch zoom
let lastTouchEnd = 0;

document.addEventListener("touchend", function(e){
  const now = Date.now();

  if(now - lastTouchEnd <= 300){
    e.preventDefault();
  }

  lastTouchEnd = now;
}, { passive:false });


const STRICT_MODE =
  localStorage.getItem("fitArchiveMode") !== "all";
// true = only added items
// false = everything

const sheetURL =
"https://docs.google.com/spreadsheets/d/1AP4KwfrGxdReQIcCQHcTtoMfMyYs_6Rd5xbCwAHh15w/export?format=csv&gid=0";

let tops=[];
let bottoms=[];
let hats=[];
let accs=[];

const BLANK={name:"",src:""};

let idxTop=Number(localStorage.getItem("fitTop"))||0;
let idxBot=Number(localStorage.getItem("fitBot"))||0;
let idxHat=Number(localStorage.getItem("fitHat"))||0;
let idxAcc=Number(localStorage.getItem("fitAcc"))||0;

let lockTop = false;
let lockBot = false;
let lockHat = false;
let lockAcc = false;

/* DOM references */

const topImg=document.getElementById("topImg");
const botImg=document.getElementById("botImg");
const hatImg=document.getElementById("hatImg");
const accImg=document.getElementById("accImg");

const topSlot=document.getElementById("topSlot");
const botSlot=document.getElementById("botSlot");
const hatSlot=document.getElementById("hatSlot");
const accSlot=document.getElementById("accSlot");

function setImg(img,slot,src){

  const s=(src||"").trim();

  if(!s){
    img.removeAttribute("src");
    img.style.display="none";
    slot.classList.add("blank");
  }else{
    img.src=s;
    img.style.display="block";
    slot.classList.remove("blank");
  }

}

function render(){

  localStorage.setItem("fitTop",idxTop);
  localStorage.setItem("fitBot",idxBot);
  localStorage.setItem("fitHat",idxHat);
  localStorage.setItem("fitAcc",idxAcc);

  setImg(topImg,topSlot,tops[idxTop]?.src);
  setImg(botImg,botSlot,bottoms[idxBot]?.src);
  setImg(hatImg,hatSlot,hats[idxHat]?.src);
  setImg(accImg,accSlot,accs[idxAcc]?.src);

}

function waitForImages(container){
  const imgs = container.querySelectorAll("img");
  return Promise.all([...imgs].map(img=>{
    if(img.complete) return Promise.resolve();
    return new Promise(res=>{
      img.onload = img.onerror = res;
    });
  }));
}
  
function attachSwipe(slot,getList,getIndex,setIndex){

  let startX = 0;
  let startY = 0;
  let isHorizontal = false;

  slot.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isHorizontal = false;
  },{passive:true});

  slot.addEventListener("touchmove", e=>{
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    if(Math.abs(dx) > Math.abs(dy)){
      isHorizontal = true;
      e.preventDefault();
    }

  },{passive:false});

  slot.addEventListener("touchend", e=>{

    if(!isHorizontal) return;

    let dx = e.changedTouches[0].clientX - startX;

    if(Math.abs(dx) < 40) return;

    let list = getList();
    if(list.length <= 1) return;

    let cur = getIndex();

    if(dx < 0) setIndex((cur+1)%list.length);
    else setIndex((cur-1+list.length)%list.length);

    render();

  },{passive:true});

}

function rand(n){
  return Math.floor(Math.random()*n);
}

function randomize(){

  if(tops.length && !lockTop) idxTop = rand(tops.length);
  if(bottoms.length && !lockBot) idxBot = rand(bottoms.length);
  if(hats.length && !lockHat) idxHat = rand(hats.length);
  if(accs.length && !lockAcc) idxAcc = rand(accs.length);

  render();

}

function toggleLock(slotName){
  if(slotName === "top"){
    lockTop = !lockTop;
    showToast(lockTop ? "Top Locked 🔒" : "Top Unlocked 🔓");
  }

  if(slotName === "bottom"){
    lockBot = !lockBot;
    showToast(lockBot ? "Bottom Locked 🔒" : "Bottom Unlocked 🔓");
  }

  if(slotName === "hat"){
    lockHat = !lockHat;
    showToast(lockHat ? "Hat Locked 🔒" : "Hat Unlocked 🔓");
  }

  if(slotName === "acc"){
    lockAcc = !lockAcc;
    showToast(lockAcc ? "Accessory Locked 🔒" : "Accessory Unlocked 🔓");
  }
}

function saveFitToGallery(canvas){

  let fits = JSON.parse(localStorage.getItem("savedFits") || "[]");

  const image = canvas.toDataURL("image/jpeg", 0.7);

  fits.unshift({
    img: image,
    date: Date.now(),
    top: topImg.src,
    bottom: botImg.src,
    hat: hatImg.src,
    acc: accImg.src
  });

  if(fits.length === 10){
    showToast("Max Fits Reached");
    return;
  }

  localStorage.setItem("savedFits", JSON.stringify(fits));

  showToast("Saved ✓");
}  

async function saveToGalleryOnly(){

  const controls = document.querySelector(".fit-controls");
  controls.style.display = "none";

  try {

    const exportBox = document.createElement("div");

    exportBox.style.position = "fixed";
    exportBox.style.left = "-9999px";
    exportBox.style.top = "-9999px";
    exportBox.style.width = "1080px";
    exportBox.style.height = "1920px";
    exportBox.style.background = "#ffffff";

    exportBox.style.display = "flex";
    exportBox.style.flexDirection = "column";
    exportBox.style.alignItems = "center";
    exportBox.style.justifyContent = "space-between";
    exportBox.style.padding = "120px 0";

    function makeSlot(img, height){
      const slot = document.createElement("div");
      slot.style.width = "80%";
      slot.style.height = height + "px";
      slot.style.display = "flex";
      slot.style.alignItems = "center";
      slot.style.justifyContent = "center";

      img.style.maxWidth = "100%";
      img.style.maxHeight = "100%";
      img.style.objectFit = "contain";

      slot.appendChild(img);
      return slot;
    }

  function cloneImageWithSrc(original){
  const img = document.createElement("img");
  img.crossOrigin = "anonymous";
  img.src = original.src || "";
  return img;
}

    const hat = cloneImageWithSrc(hatImg);
    const acc = cloneImageWithSrc(accImg);
    const top = cloneImageWithSrc(topImg);
    const bot = cloneImageWithSrc(botImg);

    const hatRow = document.createElement("div");
    hatRow.style.display = "flex";
    hatRow.style.width = "80%";
    hatRow.style.justifyContent = "space-between";
    hatRow.style.height = "250px";

    hatRow.appendChild(makeSlot(hat,250));
    hatRow.appendChild(makeSlot(acc,250));

    exportBox.appendChild(hatRow);
    exportBox.appendChild(makeSlot(top,700));
    exportBox.appendChild(makeSlot(bot,700));

    document.body.appendChild(exportBox);

    await waitForImages(exportBox);
    
    const canvas = await html2canvas(exportBox,{
      backgroundColor:"#ffffff",
      scale:1,
      useCORS:true
    });

    saveFitToGallery(canvas);

    document.body.removeChild(exportBox);

  } catch (err) {
    console.error(err);
  } finally {
    controls.style.display = "flex";
  }
}
  
async function saveFit(){

  const controls = document.querySelector(".fit-controls");
  controls.style.display = "none";

  try {

    const exportBox = document.createElement("div");

    exportBox.style.position = "fixed";
    exportBox.style.left = "-9999px";
    exportBox.style.top = "-9999px";
    exportBox.style.width = "1080px";
    exportBox.style.height = "1920px";
    exportBox.style.background = "#ffffff";

    exportBox.style.display = "flex";
    exportBox.style.flexDirection = "column";
    exportBox.style.alignItems = "center";
    exportBox.style.justifyContent = "space-between";
    exportBox.style.padding = "120px 0";

    function makeSlot(img, height){
      const slot = document.createElement("div");
      slot.style.width = "80%";
      slot.style.height = height + "px";
      slot.style.display = "flex";
      slot.style.alignItems = "center";
      slot.style.justifyContent = "center";

      img.style.maxWidth = "100%";
      img.style.maxHeight = "100%";
      img.style.objectFit = "contain";

      slot.appendChild(img);
      return slot;
    }

    const hat = hatImg.cloneNode();
    const acc = accImg.cloneNode();
    const top = topImg.cloneNode();
    const bot = botImg.cloneNode();

    const hatRow = document.createElement("div");
    hatRow.style.display = "flex";
    hatRow.style.width = "80%";
    hatRow.style.justifyContent = "space-between";
    hatRow.style.height = "250px";

    hatRow.appendChild(makeSlot(hat,250));
    hatRow.appendChild(makeSlot(acc,250));

    exportBox.appendChild(hatRow);
    exportBox.appendChild(makeSlot(top,700));
    exportBox.appendChild(makeSlot(bot,700));

    document.body.appendChild(exportBox);

    await waitForImages(exportBox);
    
    const canvas = await html2canvas(exportBox,{
      backgroundColor:"#ffffff",
      scale:2,
      useCORS:true
    });

    const now = new Date();
    const date =
      now.getFullYear()+"-"+
      String(now.getMonth()+1).padStart(2,"0")+"-"+
      String(now.getDate()).padStart(2,"0");

    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/png");
    link.download = `fit-${date}.png`;

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    document.body.removeChild(exportBox);

  } catch(err){
    console.error(err);
  } finally {
    controls.style.display = "flex";
  }
}

document.getElementById("randomBtn").onclick=randomize;
document.getElementById("saveBtn").onclick=saveFit;
document.getElementById("saveFitBtn").onclick = saveToGalleryOnly;
document.getElementById("fitsBtn").onclick = () => {
  window.location.href = "fits.html";
};

topSlot.addEventListener("click", () => toggleLock("top"));
botSlot.addEventListener("click", () => toggleLock("bottom"));
hatSlot.addEventListener("click", () => toggleLock("hat"));
accSlot.addEventListener("click", () => toggleLock("acc"));

fetch(sheetURL)
.then(r=>r.text())
.then(data=>{

  const rows = data.split("\n").slice(1);

  const sheetItems = rows.map(r=>r.split(",")).map(c=>({
    id: c[0],
    name: c[1]?.trim(),
    category: c[2]?.trim(),
    src: c[8]?.split("|")[0]?.trim()
  }));

  const myItems = JSON.parse(localStorage.getItem("myItems") || "[]");

  let sourceItems;

  if(STRICT_MODE){
    sourceItems = myItems;
  } else {
    sourceItems = [...myItems, ...sheetItems];
  }

  function firstFitPhoto(item){
  const src = item.src || item.image || "";
  return src.split("|")[0].trim();
}

const fitItems = sourceItems.map(i => ({
  ...i,
  src: firstFitPhoto(i)
}));

tops = fitItems.filter(i=>i.category==="Tops");
bottoms = fitItems.filter(i=>i.category==="Bottoms");

hats = [BLANK, ...fitItems.filter(i=>i.category==="Hats")];
accs = [BLANK, ...fitItems.filter(i=>i.category==="Accessories")];

  const editFit = JSON.parse(localStorage.getItem("editFit") || "null");

  function matchIndex(list, src){
    if(!src) return 0;

    return list.findIndex(i => {
      if(!i.src) return false;
      return src.includes(i.src) || i.src.includes(src);
    });
  }

  if(editFit){

    idxTop = matchIndex(tops, editFit.top);
    idxBot = matchIndex(bottoms, editFit.bottom);
    idxHat = matchIndex(hats, editFit.hat);
    idxAcc = matchIndex(accs, editFit.acc);

    if(idxTop < 0) idxTop = 0;
    if(idxBot < 0) idxBot = 0;
    if(idxHat < 0) idxHat = 0;
    if(idxAcc < 0) idxAcc = 0;

    localStorage.removeItem("editFit");
  }

  render();

  attachSwipe(topSlot,()=>tops,()=>idxTop,v=>idxTop=v);
  attachSwipe(botSlot,()=>bottoms,()=>idxBot,v=>idxBot=v);
  attachSwipe(hatSlot,()=>hats,()=>idxHat,v=>idxHat=v);
  attachSwipe(accSlot,()=>accs,()=>idxAcc,v=>idxAcc=v);

}); 

function showToast(text){
  const toast = document.getElementById("toast");
  toast.textContent = text;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },2000);
}
  
</script>

<div id="toast">Saved ✓</div>
