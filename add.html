<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  padding:20px;
}

.topbar{
  height:64px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.back{
  position:absolute;
  left:16px;
  color:#e10600;
  font-weight:600;
  cursor:pointer;
}

.title{
  font-weight:700;
  font-size:18px;
}

.form{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-top:20px;
}

input, select{
  padding:12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  margin-top:10px;
  padding:14px;
  background:#e10600;
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:700;
}

.result{
  margin-top:20px;
  text-align:left;
}

.result-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.result-item img{
  width:50px;
  height:50px;
  object-fit:contain;
}

.result-item.selected{
  background:#f5f5f5;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="back" id="backText" onclick="history.back()">← Back</div>
  <div class="title" id="titleText">Add Item</div>
</div>

<div class="form">

<input id="search" placeholder="Search item name...">

<select id="size">
  <option value="" id="selectSizeText">Select size</option>
</select>

<button id="addBtn">Add Item</button>

</div>

<div class="result" id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="lang.js"></script>

<script>
const sheetURL =
"https://docs.google.com/spreadsheets/d/1AP4KwfrGxdReQIcCQHcTtoMfMyYs_6Rd5xbCwAHh15w/export?format=csv&gid=0";

let items = [];
let selectedItem = null;

function clean(v){
  return (v ?? "").toString().trim().replace(/^"+|"+$/g,"");
}

function applyLanguage(){
  setText("backText", "back");
  setText("titleText", "addItem");
  setPlaceholder("search", "searchItem");
  setText("selectSizeText", "selectSize");
  setText("addBtn", "addItemBtn");
}

applyLanguage();

function showLoaded(){
  document.getElementById("result").innerHTML = "";
}


// 📦 LOAD DATA
fetch(sheetURL)
.then(res => res.text())
.then(csv => {

  const rows = Papa.parse(csv, {
    skipEmptyLines:true
  }).data;

  items = rows.slice(1).map((c, index) => {

    const sheetId = clean(c[0]);
    const name = clean(c[1]);
    const category = clean(c[2]);
    const image = clean(c[8]);

    return {
      // ✅ If sheet ID is blank, use name instead of fake sheet-row ID
      id: sheetId || name,
      sheetId: sheetId,
      name,
      category,
      image
    };

  })
  .filter(i => i.name);

  showLoaded();

})
.catch(err => {
  console.error("ADD LOAD ERROR:", err);
  document.getElementById("result").innerHTML = "Error loading items";
});


// 🔥 SIZE LOGIC
function setSizeOptions(item){

  const sizeSelect = document.getElementById("size");

  let sizes = [];
  const name = (item.name || "").toLowerCase();

  if(name.includes("jean")){
    sizes = ["30", "32", "34", "36", "38"];
  }
  else if(item.category === "Tops"){
  sizes = ["S", "M", "L", "XL", "XXL"];
}
else if(item.category === "Bottoms"){
  sizes = ["S", "M", "L", "XL", "XXL"];
}
  else if(item.category === "Hats"){
    sizes = ["S/M", "M/L", "One Size"];
  }
  else{
    sizes = ["One Size"];
  }

  sizeSelect.innerHTML =
    `<option value="">${t("selectSize")}</option>` +
    sizes.map(s =>
      `<option value="${s}">${s}</option>`
    ).join("");

}


// 🔍 SEARCH
document.getElementById("search").addEventListener("input", e=>{

  const val = e.target.value.toLowerCase();

  const container = document.getElementById("result");

  container.innerHTML = "";

  selectedItem = null;

  if(!val){
    showLoaded();
    return;
  }

  const results = items.filter(i =>
    (i.name || "").toLowerCase().includes(val)
  );

  if(results.length === 0){
    container.innerHTML =
      `<div style="color:#999;font-size:14px;">No results</div>`;
    return;
  }

  results.forEach(item => {

    const img =
      item.image
      ? item.image.split("|")[0].trim()
      : "";

    const div = document.createElement("div");

    div.className = "result-item";

    div.innerHTML = `
      ${img ? `<img src="${img}">` : ""}
      <div>${item.name}</div>
    `;

    div.onclick = () => {

      document.querySelectorAll(".result-item")
      .forEach(el =>
        el.classList.remove("selected")
      );

      div.classList.add("selected");

      selectedItem = item;

      setSizeOptions(item);

    };

    container.appendChild(div);

  });

});


// ➕ ADD ITEM
document.getElementById("addBtn").onclick = () => {

  if(!selectedItem){
    return alert("Select item");
  }

  const size =
    document.getElementById("size").value;

  if(!size){
    return alert(t("selectSize"));
  }

  let myItems =
    JSON.parse(localStorage.getItem("myItems") || "[]");

  myItems.push({
    id: "user-" + Date.now(),

    // ✅ Keep sheetId blank if sheet ID is blank
    sheetId: selectedItem.sheetId || "",

    // ✅ Save name so item.html can find it by name
    name: selectedItem.name,

    category: selectedItem.category,
    size,
    src: selectedItem.image || ""
  });

  localStorage.setItem(
    "myItems",
    JSON.stringify(myItems)
  );

  alert("Added ✓");

  window.location.href = "index.html";

};

</script>

</body>
</html>
