<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:-apple-system;
  padding:20px;
}

.topbar{
  height:64px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.back{
  position:absolute;
  left:16px;
  color:#e10600;
  font-weight:600;
  cursor:pointer;
}

.title{
  font-weight:700;
  font-size:18px;
}

.form{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-top:20px;
}

input, select{
  padding:12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  margin-top:10px;
  padding:14px;
  background:#e10600;
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:700;
}

.result{
  margin-top:20px;
  text-align:left;
}

.result-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.result-item img{
  width:50px;
  height:50px;
  object-fit:contain;
}

.result-item.selected{
  background:#f5f5f5;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="back" onclick="history.back()">← Back</div>
  <div class="title">Add Item</div>
</div>

<div class="form">

<input id="search" placeholder="Search item name...">

<select id="size">
  <option value="">Select size</option>
</select>

<button id="addBtn">Add Item</button>

</div>

<div class="result" id="result"></div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1AP4KwfrGxdReQIcCQHcTtoMfMyYs_6Rd5xbCwAHh15w/export?format=csv&gid=0";

let items = [];
let selectedItem = null;

// 📦 LOAD DATA
fetch(sheetURL)
.then(r=>r.text())
.then(data=>{
  const rows = data.split("\n").slice(1);

  items = rows.map(r=>r.split(",")).map(c=>({
    id: c[0],
    name: c[1],
    category: c[2],
    image: c[8],
  }));
});


// 🔥 SIZE LOGIC
function setSizeOptions(item){
  const sizeSelect = document.getElementById("size");

  let sizes = [];
  const name = item.name.toLowerCase();

  if(name.includes("jean")){
    sizes = ["30", "32", "34", "36", "38"];
  }
  else if(item.category === "Tops"){
    sizes = ["S", "M", "L", "XL"];
  }
  else if(item.category === "Bottoms"){
    sizes = ["S", "M", "L", "XL"];
  }
  else{
    sizes = ["One Size"];
  }

  sizeSelect.innerHTML =
    `<option value="">Select size</option>` +
    sizes.map(s => `<option value="${s}">${s}</option>`).join("");
}


// 🔍 SEARCH (FIXED)
document.getElementById("search").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase();

  const container = document.getElementById("result");
  container.innerHTML = "";

  if(!val) return;

  const results = items.filter(i =>
    i.name.toLowerCase().includes(val)
  );

  results.slice(0, 20).forEach(item => {

    const img = (item.image || "").split("|")[0];

    const div = document.createElement("div");
    div.className = "result-item";

    div.innerHTML = `
      <img src="${img}">
      <div>${item.name}</div>
    `;

    div.onclick = () => {
      document.querySelectorAll(".result-item")
        .forEach(el => el.classList.remove("selected"));

      div.classList.add("selected");

      selectedItem = item;

      setSizeOptions(item);
    };

    container.appendChild(div);
  });
});


// ➕ ADD ITEM (OUTSIDE search)
document.getElementById("addBtn").onclick = () => {

  if(!selectedItem) return alert("Select item");

  const size = document.getElementById("size").value;
  if(!size) return alert("Select size");

  let myItems = JSON.parse(localStorage.getItem("myItems") || "[]");

  myItems.push({
    id: "user-" + Date.now(),
    name: selectedItem.name,
    category: selectedItem.category,
    size,
    src: selectedItem.image.split("|")[0]
  });

  localStorage.setItem("myItems", JSON.stringify(myItems));

  alert("Added ✓");

  window.location.href = "index.html";
};

</script>

</body>
</html>
